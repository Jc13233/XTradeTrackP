<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack App</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#020617;
  color:white;
  text-align:center;
}

.container {
  max-width:600px;
  margin:auto;
  padding:60px 20px;
}

.stat {
  background:#0f172a;
  padding:20px;
  margin:10px;
  border-radius:12px;
  font-size:22px;
}

button {
  padding:15px 30px;
  margin:10px;
  border:none;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
}

.win { background:#16a34a; }
.loss { background:#dc2626; }

.progress {
  height:10px;
  background:#1e293b;
  border-radius:10px;
  margin-top:20px;
}

.bar {
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#4f7cff,#7c3aed);
}
</style>
</head>

<body>

<div class="container">

<h1>TradeTrack</h1>

<div class="stat">XP: <span id="xp">0</span></div>
<div class="stat">Lives: <span id="lives">3</span></div>
<div class="stat">Level: <span id="level">1</span></div>

<div class="progress">
  <div class="bar" id="bar"></div>
</div>

<button class="win" onclick="win()">Win</button>
<button class="loss" onclick="loss()">Loss</button>

</div>

<script>
let xp = localStorage.getItem("xp") || 0;
let lives = localStorage.getItem("lives") || 3;
let level = localStorage.getItem("level") || 1;

function update() {
  document.getElementById("xp").innerText = xp;
  document.getElementById("lives").innerText = lives;
  document.getElementById("level").innerText = level;

  let percent = (xp / 100) * 100;
  document.getElementById("bar").style.width = percent + "%";

  localStorage.setItem("xp", xp);
  localStorage.setItem("lives", lives);
  localStorage.setItem("level", level);
}

function win() {
  xp = parseInt(xp) + 10;

  if (xp >= 100) {
    xp = 0;
    level++;
  }

  update();
}

function loss() {
  xp = Math.max(0, xp - 5);
  lives = Math.max(0, lives - 1);

  update();
}

update();
</script>

</body>
</html>
