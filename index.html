<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack - Discipline System</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#020617;
  color:white;
  text-align:center;
}

.container {
  max-width:600px;
  margin:auto;
  padding:40px 20px;
}

input {
  padding:10px;
  margin:10px;
  width:120px;
  border-radius:8px;
  border:none;
}

button {
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
}

.start { background:#4f7cff; }
.good { background:#16a34a; }
.bad { background:#dc2626; }

.card {
  background:#0f172a;
  padding:20px;
  margin-top:20px;
  border-radius:12px;
}

.locked {
  color:red;
  font-size:20px;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>TradeTrack</h1>
<p>Discipline is enforced. Not optional.</p>

<!-- SETUP -->
<div class="card" id="setup">
<h3>Start Session</h3>

<p>Max Trades</p>
<input id="maxTrades" type="number" value="3">

<p>Max Rule Breaks</p>
<input id="maxBreaks" type="number" value="2">

<br>
<button class="start" onclick="startSession()">Start Session</button>
</div>

<!-- SESSION -->
<div class="card" id="session" style="display:none;">

<p>Trades Taken: <span id="trades">0</span></p>
<p>Rule Breaks: <span id="breaks">0</span></p>

<button class="good" onclick="followRule()">Followed Rules</button>
<button class="bad" onclick="breakRule()">Broke Rules</button>

<div id="status"></div>

</div>

</div>

<script>
let trades = 0;
let breaks = 0;
let maxTrades = 0;
let maxBreaks = 0;
let locked = false;

function startSession() {
  maxTrades = parseInt(document.getElementById("maxTrades").value);
  maxBreaks = parseInt(document.getElementById("maxBreaks").value);

  trades = 0;
  breaks = 0;
  locked = false;

  document.getElementById("setup").style.display = "none";
  document.getElementById("session").style.display = "block";

  update();
}

function followRule() {
  if (locked) return;

  trades++;
  update();
  checkLimits();
}

function breakRule() {
  if (locked) return;

  trades++;
  breaks++;
  update();
  checkLimits();
}

function checkLimits() {
  if (breaks >= maxBreaks || trades >= maxTrades) {
    locked = true;
    document.getElementById("status").innerHTML =
      "<div class='locked'>SESSION LOCKED — STOP TRADING</div>";
  }
}

function update() {
  document.getElementById("trades").innerText = trades;
  document.getElementById("breaks").innerText = breaks;
}
</script>

</body>
</html>
