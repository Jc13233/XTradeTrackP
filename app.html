<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:white;
}

.container {
  max-width:700px;
  margin:auto;
  padding:40px 20px;
  text-align:center;
}

.card {
  background:rgba(255,255,255,0.05);
  padding:25px;
  margin-top:20px;
  border-radius:20px;
}

button {
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.start { background:#7c3aed; }
.good { background:#16a34a; }
.bad { background:#dc2626; }

.hidden { display:none; }

textarea {
  width:100%;
  height:100px;
  border-radius:10px;
  border:none;
  padding:10px;
}

.entry {
  text-align:left;
  margin-top:15px;
  padding:10px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}

.upgrade { color:#a78bfa; }
</style>
</head>

<body>

<div class="container">

<h1>TradeTrack</h1>

<!-- SETUP -->
<div class="card" id="setup">

<h3>Checklist</h3>

<label><input type="checkbox" id="c1"> Setup</label><br>
<label><input type="checkbox" id="c2"> Risk</label><br>
<label><input type="checkbox" id="c3"> No revenge</label><br>
<label><input type="checkbox" id="c4"> Follow plan</label>

<br>
<button class="start" id="startBtn">Start Session</button>

<p id="usage"></p>
<p>🔥 Streak: <span id="streak">0</span></p>
<p>⭐ Level: <span id="level">1</span> | XP: <span id="xp">0</span></p>

<a href="https://buy.stripe.com/aFa8wP0XEfQhfb81F16Na01" target="_blank">
<button class="start">Upgrade to Pro — £15/month</button>
</a>

</div>

<!-- SESSION -->
<div class="card hidden" id="session">

<p>Trades: <span id="trades">0</span></p>
<p>Mistakes: <span id="breaks">0</span></p>
<p>Score: <span id="score">100</span>%</p>

<button class="good" id="goodBtn">Good</button>

<select id="reason">
<option value="">Why break?</option>
<option>FOMO</option>
<option>Revenge</option>
<option>Boredom</option>
<option>Impulse</option>
</select>

<button class="bad" id="badBtn">Bad</button>

<br>
<button id="endBtn">End Session</button>

</div>

<!-- RESULT -->
<div class="card hidden" id="result">

<h2 id="resultTitle"></h2>
<h1 id="grade"></h1>

<h3>Notes</h3>
<textarea id="notes"></textarea>

<br>
<button id="saveNoteBtn">Save</button>

</div>

<!-- JOURNAL -->
<div class="card">

<h3>Session Journal (Pro)</h3>

<div id="journalContent"></div>

<div id="journalLock" class="upgrade hidden">
Upgrade to Pro to view your journal
</div>

</div>

</div>

<script>

/* PLAN */
let plan = localStorage.getItem("plan") || "free";
if(window.location.search.includes("pro=true")){
  plan="pro";
  localStorage.setItem("plan","pro");
}

/* DATA */
let freeUsed = +localStorage.getItem("freeUsed") || 0;
let streak = +localStorage.getItem("streak") || 0;
let history = JSON.parse(localStorage.getItem("history") || "[]");

let xp = +localStorage.getItem("xp") || 0;
let level = +localStorage.getItem("level") || 1;

/* ELEMENTS */
const startBtn = document.getElementById("startBtn");
const goodBtn = document.getElementById("goodBtn");
const badBtn = document.getElementById("badBtn");
const endBtn = document.getElementById("endBtn");

const setup = document.getElementById("setup");
const session = document.getElementById("session");
const result = document.getElementById("result");

const notesInput = document.getElementById("notes");
const saveNoteBtn = document.getElementById("saveNoteBtn");

const journalContent = document.getElementById("journalContent");
const journalLock = document.getElementById("journalLock");

document.getElementById("usage").innerText =
  plan==="free"
  ? "Free sessions left: " + (5-freeUsed)
  : "Unlimited";

document.getElementById("streak").innerText = streak;
document.getElementById("xp").innerText = xp;
document.getElementById("level").innerText = level;

/* SESSION */
let trades=0, breaks=0, score=100;
let reasons=[];

startBtn.onclick = () => {

  if(plan==="free" && freeUsed>=5){
    alert("Limit reached");
    return;
  }

  if(!c1.checked||!c2.checked||!c3.checked||!c4.checked){
    alert("Complete checklist");
    return;
  }

  setup.classList.add("hidden");
  session.classList.remove("hidden");
};

goodBtn.onclick = () => { trades++; };

badBtn.onclick = () => {
  let r = reason.value;
  if(!r){ alert("Pick reason"); return; }
  trades++; breaks++; score -= 25;
  reasons.push(r);
};

endBtn.onclick = () => {

  if(plan==="free"){
    freeUsed++;
    localStorage.setItem("freeUsed", freeUsed);
  }

  if(score>=75){ streak++; } else { streak=0; }
  localStorage.setItem("streak", streak);

  let gainedXP = Math.max(10, score);
  xp += gainedXP;

  if(xp >= level*100){
    xp -= level*100;
    level++;
  }

  localStorage.setItem("xp", xp);
  localStorage.setItem("level", level);

  history.push({
    score:score,
    reasons:reasons,
    note:""
  });

  localStorage.setItem("history", JSON.stringify(history));

  session.classList.add("hidden");
  result.classList.remove("hidden");
};

/* SAVE NOTE */
saveNoteBtn.onclick = () => {
  history[history.length-1].note = notesInput.value;
  localStorage.setItem("history", JSON.stringify(history));
  location.reload();
};

/* JOURNAL LOAD */
function loadJournal(){

  if(plan==="free"){
    journalContent.style.display="none";
    journalLock.classList.remove("hidden");
    return;
  }

  journalContent.innerHTML="";

  history.slice().reverse().forEach(h=>{
    journalContent.innerHTML += `
      <div class="entry">
        <strong>Score:</strong> ${h.score}%<br>
        <strong>Mistakes:</strong> ${(h.reasons||[]).join(", ") || "None"}<br>
        <strong>Note:</strong> ${h.note || "-"}
      </div>
    `;
  });
}

loadJournal();

</script>

</body>
</html>
