<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family: Inter, system-ui;
  background:#020617;
  color:#e2e8f0;
}

/* NAV */
.nav {
  display:flex;
  justify-content:center;
  gap:20px;
  padding:20px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.nav button {
  background:none;
  color:#94a3b8;
  border:none;
  font-size:16px;
  cursor:pointer;
}

.nav button.active { color:#a78bfa; }

/* GRID LAYOUT */
.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns: 2fr 1fr;
  gap:20px;
}

/* CARDS */
.card {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  padding:20px;
}

/* BUTTONS */
button {
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:10px;
}

.primary { background:#7c3aed; color:white; }
.bad { background:#ef4444; color:white; }

/* PROGRESS */
.progress {
  height:8px;
  background:#020617;
  border-radius:10px;
  margin-top:10px;
}

.bar {
  height:100%;
  background:#7c3aed;
}

.hidden { display:none; }

.entry {
  padding:10px;
  margin-top:10px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}

.small { color:#94a3b8; font-size:13px; }

.locked {
  color:#ef4444;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="nav">
  <button onclick="showTab('dash')" class="active" id="tabDash">Dashboard</button>
  <button onclick="showTab('journal')" id="tabJournal">Journal</button>
  <button onclick="showTab('insights')" id="tabInsights">Insights</button>
</div>

<div class="container">

<!-- DASHBOARD -->
<div id="dash">

<div class="grid">

<!-- LEFT (MAIN) -->
<div>

<div class="card">
<h3>Performance</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>Session</h3>

<div id="idleState">
  <p class="small">No active session</p>
  <button class="primary" onclick="startSession()">Start Session</button>
</div>

<div id="activeState" class="hidden">
  <p>Score: <span id="score">100</span>%</p>

  <select id="reason">
    <option value="">Why break?</option>
    <option>FOMO</option>
    <option>Revenge</option>
    <option>Boredom</option>
    <option>Impulse</option>
  </select>

  <br>

  <button class="bad" onclick="bad()">Mistake</button>
  <button onclick="endSession()">End Session</button>
</div>

</div>

</div>

<!-- RIGHT (SIDE PANEL) -->
<div>

<div class="card">
<h3>Daily Limit</h3>

<p>Max mistakes: <span id="limitDisplay"></span></p>

<button onclick="setLimit(0)">0</button>
<button onclick="setLimit(1)">1</button>
<button onclick="setLimit(2)">2</button>

<p id="lockStatus" class="small"></p>
</div>

<div class="card">
<h3>Stats</h3>
<p>🔥 Streak: <span id="streak">0</span></p>
<p>⭐ Level: <span id="level">1</span></p>
<div class="progress"><div id="xpBar" class="bar"></div></div>
</div>

<div class="card">
<a href="https://buy.stripe.com/aFa8wP0XEfQhfb81F16Na01" target="_blank">
<button class="primary">Upgrade (£15/mo)</button>
</a>
<p id="usage"></p>
</div>

</div>

</div>

</div>

<!-- JOURNAL -->
<div id="journal" class="hidden">
<div class="card">
<h2>Journal</h2>

<button onclick="filter('all')">All</button>
<button onclick="filter('good')">Good</button>
<button onclick="filter('bad')">Bad</button>

<div id="journalList"></div>
</div>
</div>

<!-- INSIGHTS -->
<div id="insights" class="hidden">
<div class="card">
<h2>Insights</h2>
<div id="insightBox"></div>
</div>
</div>

</div>

<script>

/* TAB */
function showTab(tab){
  ["dash","journal","insights"].forEach(id=>{
    document.getElementById(id).classList.add("hidden");
    document.getElementById("tab"+id.charAt(0).toUpperCase()+id.slice(1)).classList.remove("active");
  });
  document.getElementById(tab).classList.remove("hidden");
  document.getElementById("tab"+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add("active");
}

/* DATA */
let history = JSON.parse(localStorage.getItem("history")||"[]");
let streak = +localStorage.getItem("streak")||0;
let xp = +localStorage.getItem("xp")||0;
let level = +localStorage.getItem("level")||1;
let freeUsed = +localStorage.getItem("freeUsed")||0;

/* DAILY LOCK */
let today = new Date().toDateString();
let savedDay = localStorage.getItem("day");
let mistakesToday = +localStorage.getItem("mistakesToday")||0;
let maxMistakes = +localStorage.getItem("maxMistakes")||1;

if(savedDay !== today){
  mistakesToday = 0;
  localStorage.setItem("mistakesToday", 0);
  localStorage.setItem("day", today);
}

/* ELEMENTS */
const lockStatus = document.getElementById("lockStatus");
const limitDisplay = document.getElementById("limitDisplay");
const scoreEl = document.getElementById("score");
const reason = document.getElementById("reason");

limitDisplay.innerText = maxMistakes;

/* LOCK */
function updateLock(){
  if(mistakesToday >= maxMistakes){
    lockStatus.innerHTML = `<span class="locked">LOCKED FOR TODAY</span>`;
    return true;
  } else {
    lockStatus.innerText = `Mistakes: ${mistakesToday}/${maxMistakes}`;
    return false;
  }
}
updateLock();

function setLimit(n){
  maxMistakes = n;
  localStorage.setItem("maxMistakes", n);
  limitDisplay.innerText = n;
  updateLock();
}

/* SESSION */
let score = 100;
let active = false;

function startSession(){
  if(freeUsed>=5) return alert("Upgrade required");
  if(updateLock()) return alert("Locked for today");

  active = true;
  score = 100;

  idleState.classList.add("hidden");
  activeState.classList.remove("hidden");

  scoreEl.innerText = score;
}

function bad(){
  if(!active) return;

  let r = reason.value;
  if(!r) return alert("Pick reason");

  score -= 25;
  scoreEl.innerText = score;

  mistakesToday++;
  localStorage.setItem("mistakesToday", mistakesToday);
  updateLock();

  if(score < 50) endSession();
}

function endSession(){
  if(!active) return;

  active = false;
  freeUsed++;
  localStorage.setItem("freeUsed", freeUsed);

  history.push({score,date:Date.now()});
  localStorage.setItem("history", JSON.stringify(history));

  location.reload();
}

/* GRAPH */
let last7 = history.slice(-7);
new Chart(document.getElementById("chart"), {
  type:"line",
  data:{
    labels:last7.map((_,i)=>i+1),
    datasets:[{
      data:last7.map(h=>h.score),
      borderColor:"#7c3aed",
      tension:0.3
    }]
  },
  options:{
    plugins:{legend:{display:false}},
    scales:{y:{min:0,max:100}}
  }
});

/* JOURNAL */
function loadJournal(type="all"){
  journalList.innerHTML="";
  history.slice().reverse().forEach(h=>{
    journalList.innerHTML+=`
    <div class="entry">
      ${new Date(h.date).toLocaleDateString()} — ${h.score}%
    </div>`;
  });
}
loadJournal();

/* INSIGHTS */
function insights(){
  if(history.length<3){
    insightBox.innerText="Not enough data";
    return;
  }
}
insights();

</script>

</body>
</html>
