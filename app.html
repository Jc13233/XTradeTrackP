<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family: Inter, system-ui;
  background:#020617;
  color:#e2e8f0;
}

/* NAV */
.nav {
  display:flex;
  justify-content:center;
  gap:30px;
  padding:20px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.nav button {
  background:none;
  border:none;
  color:#64748b;
  font-size:15px;
  cursor:pointer;
}

.nav button.active { color:#a78bfa; }

/* LAYOUT */
.container {
  max-width:1100px;
  margin:auto;
  padding:30px 20px;
}

/* HERO GRAPH */
.hero {
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;
  padding:25px;
  margin-bottom:25px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: 1.5fr 1fr;
  gap:20px;
}

/* CARD */
.card {
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  padding:20px;
}

/* BUTTONS */
button {
  padding:12px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.primary {
  background:#7c3aed;
  color:white;
  width:100%;
}

.bad {
  background:#ef4444;
  color:white;
  margin-top:10px;
  width:100%;
}

/* PROGRESS */
.progress {
  height:8px;
  background:#020617;
  border-radius:10px;
  margin-top:10px;
}

.bar {
  height:100%;
  background:#7c3aed;
}

/* HIDDEN */
.hidden { display:none; }

/* TEXT */
.small {
  color:#64748b;
  font-size:13px;
}
</style>
</head>

<body>

<div class="nav">
  <button onclick="showTab('dash')" class="active" id="tabDash">Dashboard</button>
  <button onclick="showTab('journal')" id="tabJournal">Journal</button>
  <button onclick="showTab('insights')" id="tabInsights">Insights</button>
</div>

<div class="container">

<!-- DASHBOARD -->
<div id="dash">

<!-- GRAPH -->
<div class="hero">
  <h3>Performance</h3>
  <canvas id="chart"></canvas>
</div>

<div class="grid">

<!-- LEFT -->
<div class="card">
  <h3>Session</h3>

  <div id="idleState">
    <p class="small">Ready to start</p>
    <button class="primary" onclick="startSession()">Start Session</button>
  </div>

  <div id="activeState" class="hidden">
    <h2 id="score">100%</h2>

    <button class="bad" onclick="bad()">Mistake</button>
    <button onclick="endSession()">End Session</button>
  </div>
</div>

<!-- RIGHT -->
<div>

<div class="card">
  <h3>Stats</h3>
  <p>🔥 Streak: <span id="streak">0</span></p>
  <p>⭐ Level: <span id="level">1</span></p>
  <div class="progress"><div id="xpBar" class="bar"></div></div>
</div>

<div class="card">
  <a href="https://buy.stripe.com/aFa8wP0XEfQhfb81F16Na01" target="_blank">
    <button class="primary">Upgrade (£15/mo)</button>
  </a>
  <p id="usage" class="small"></p>
</div>

</div>

</div>

</div>

<!-- JOURNAL -->
<div id="journal" class="hidden">
<div class="card">
<h2>Journal</h2>
<div id="journalList"></div>
</div>
</div>

<!-- INSIGHTS -->
<div id="insights" class="hidden">
<div class="card">
<h2>Insights</h2>
<div id="insightBox"></div>
</div>
</div>

</div>

<script>

/* TAB */
function showTab(tab){
  ["dash","journal","insights"].forEach(id=>{
    document.getElementById(id).classList.add("hidden");
    document.getElementById("tab"+id.charAt(0).toUpperCase()+id.slice(1)).classList.remove("active");
  });
  document.getElementById(tab).classList.remove("hidden");
  document.getElementById("tab"+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add("active");
}

/* DATA */
let history = JSON.parse(localStorage.getItem("history")||"[]");
let streak = +localStorage.getItem("streak")||0;
let xp = +localStorage.getItem("xp")||0;
let level = +localStorage.getItem("level")||1;
let freeUsed = +localStorage.getItem("freeUsed")||0;

/* INIT */
streak.innerText = streak;
level.innerText = level;
xpBar.style.width = (xp/(level*100))*100+"%";
usage.innerText = "Free sessions left: "+(5-freeUsed);

/* SESSION */
let score = 100;
let active = false;

function startSession(){
  if(freeUsed>=5) return alert("Upgrade required");

  active = true;
  score = 100;

  idleState.classList.add("hidden");
  activeState.classList.remove("hidden");

  document.getElementById("score").innerText = score + "%";
}

function bad(){
  if(!active) return;

  score -= 25;
  document.getElementById("score").innerText = score + "%";

  if(score < 50) endSession();
}

function endSession(){
  if(!active) return;

  active = false;
  freeUsed++;
  localStorage.setItem("freeUsed", freeUsed);

  history.push({score,date:Date.now()});
  localStorage.setItem("history", JSON.stringify(history));

  location.reload();
}

/* GRAPH */
let last7 = history.slice(-7);
new Chart(document.getElementById("chart"), {
  type:"line",
  data:{
    labels:last7.map((_,i)=>i+1),
    datasets:[{
      data:last7.map(h=>h.score),
      borderColor:"#7c3aed",
      tension:0.4
    }]
  },
  options:{
    plugins:{legend:{display:false}},
    scales:{y:{min:0,max:100}}
  }
});

/* JOURNAL */
journalList.innerHTML = history.slice().reverse().map(h =>
  `<div>${new Date(h.date).toLocaleDateString()} — ${h.score}%</div>`
).join("");

</script>

</body>
</html>
