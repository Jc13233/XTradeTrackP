<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:white;
}

.container {
  max-width:800px;
  margin:auto;
  padding:40px 20px;
  text-align:center;
}

.card {
  background:rgba(255,255,255,0.04);
  padding:25px;
  margin-top:20px;
  border-radius:20px;
}

button {
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.start { background:linear-gradient(135deg,#4f7cff,#7c3aed); }
.good { background:linear-gradient(135deg,#22c55e,#16a34a); }
.bad { background:linear-gradient(135deg,#ef4444,#dc2626); }

select {
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<h1>TradeTrack</h1>

<!-- SETUP -->
<div class="card" id="setup">

<h3>Pre-Trade Checklist</h3>

<label><input type="checkbox" id="c1"> Clear setup</label><br>
<label><input type="checkbox" id="c2"> Risk defined</label><br>
<label><input type="checkbox" id="c3"> No revenge</label><br>
<label><input type="checkbox" id="c4"> Follow system</label>

<br>
<button class="start" onclick="startSession()">Start Session</button>

<p id="lockMsg"></p>

<p>🔥 Streak: <span id="streak">0</span></p>

<p id="usage"></p>

<a href="https://buy.stripe.com/aFa8wP0XEfQhfb81F16Na01" target="_blank">
<button class="start">Upgrade — £15/month</button>
</a>

</div>

<!-- SESSION -->
<div class="card hidden" id="session">

<p>Trades: <span id="trades">0</span></p>
<p>Mistakes: <span id="breaks">0</span></p>
<p>Score: <span id="score">100</span>%</p>

<button class="good" onclick="good()">Executed Discipline</button>

<br>

<select id="reason">
<option value="">Why did you break?</option>
<option>FOMO</option>
<option>Revenge</option>
<option>Boredom</option>
<option>Impulse</option>
</select>

<button class="bad" onclick="bad()">Broke System</button>

<br>
<button onclick="endSession()">End Session</button>

</div>

<!-- RESULT -->
<div class="card hidden" id="result">
<h2>Session Complete</h2>
<h1 id="grade"></h1>
<p id="resultText"></p>
<button onclick="location.reload()">New Session</button>
</div>

<!-- JOURNAL -->
<div class="card">

<h3>Behavior Journal</h3>

<p>Total Mistakes: <span id="totalMistakes">0</span></p>
<p>Most Common: <span id="commonMistake">-</span></p>

</div>

<!-- HISTORY -->
<div class="card">

<h3>Session History</h3>
<div id="history"></div>

</div>

</div>

<script>
let plan = localStorage.getItem("plan") || "free";

/* LOCK */
let today = new Date().toDateString();
let last = localStorage.getItem("lastSessionDate");

if(last === today){
  lockMsg.innerText="You are done for today.";
}

/* DATA */
let freeUsed = localStorage.getItem("freeUsed") || 0;
let streak = localStorage.getItem("streak") || 0;
let history = JSON.parse(localStorage.getItem("history") || "[]");

streakEl.innerText = streak;

usage.innerText =
  plan==="free"
  ? "Free sessions left: "+(5-freeUsed)
  : "Unlimited";

/* SESSION */
let trades=0, breaks=0, score=100;
let sessionActive=false;

/* ANTI CHEAT */
if(localStorage.getItem("activeSession")==="true"){
  alert("Session abandoned. Marked as failed.");

  history.push({
    score:0,
    date:new Date().toISOString(),
    mistakes:5,
    reason:"Abandoned"
  });

  localStorage.setItem("history", JSON.stringify(history));
  localStorage.removeItem("activeSession");
}

function startSession(){

  if(last===today){
    alert("Come back tomorrow.");
    return;
  }

  if(plan==="free" && freeUsed>=5){
    alert("Upgrade required");
    return;
  }

  if(!c1.checked||!c2.checked||!c3.checked||!c4.checked){
    alert("Complete checklist");
    return;
  }

  sessionActive=true;
  localStorage.setItem("activeSession","true");

  setup.classList.add("hidden");
  session.classList.remove("hidden");
}

function good(){
  trades++;
  update();
}

function bad(){

  let r = reason.value;

  if(!r){
    alert("Select a reason");
    return;
  }

  trades++;
  breaks++;
  score -= 25;

  sessionReasons.push(r);

  update();
}

let sessionReasons=[];

function update(){
  tradesEl.innerText=trades;
  breaksEl.innerText=breaks;
  scoreEl.innerText=score;
}

function endSession(){

  localStorage.removeItem("activeSession");
  localStorage.setItem("lastSessionDate", today);

  if(plan==="free"){
    freeUsed++;
    localStorage.setItem("freeUsed", freeUsed);
  }

  if(score>=75) streak++; else streak=0;
  localStorage.setItem("streak", streak);

  history.push({
    score:score,
    date:new Date().toISOString(),
    mistakes:breaks,
    reasons:sessionReasons
  });

  localStorage.setItem("history", JSON.stringify(history));

  session.classList.add("hidden");
  result.classList.remove("hidden");

  gradeEl.innerText =
    score>=90?"A":score>=75?"B":score>=50?"C":"D";

  resultText.innerText="Discipline recorded.";
}

/* JOURNAL */
function loadJournal(){

  let total=0;
  let counts={};

  history.forEach(h=>{
    total += h.mistakes || 0;

    (h.reasons||[]).forEach(r=>{
      counts[r]=(counts[r]||0)+1;
    });
  });

  totalMistakes.innerText=total;

  let common="-", max=0;
  for(let k in counts){
    if(counts[k]>max){
      max=counts[k];
      common=k;
    }
  }

  commonMistake.innerText=common;
}

/* HISTORY */
function loadHistory(){
  historyDiv.innerHTML="";
  history.slice().reverse().forEach(h=>{
    historyDiv.innerHTML += `<div>
      ${new Date(h.date).toLocaleDateString()} — ${h.score}%
    </div>`;
  });
}

loadJournal();
loadHistory();
</script>

</body>
</html>
