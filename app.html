<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:white;
}

.container {
  max-width:800px;
  margin:auto;
  padding:40px 20px;
  text-align:center;
}

.card {
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  padding:25px;
  margin-top:20px;
  border-radius:20px;
}

button {
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.start { background:linear-gradient(135deg,#4f7cff,#7c3aed); }
.good { background:linear-gradient(135deg,#22c55e,#16a34a); }
.bad { background:linear-gradient(135deg,#ef4444,#dc2626); }

.hidden { display:none; }

.progress {
  height:10px;
  background:#111;
  border-radius:10px;
  margin-top:10px;
  overflow:hidden;
}
.bar {
  height:100%;
  width:100%;
  background:linear-gradient(90deg,#22c55e,#4f7cff);
  transition:0.3s;
}

.upgrade { color:#a78bfa; margin-top:10px; }
</style>
</head>

<body>

<div class="container">

<h1>TradeTrack</h1>

<!-- SETUP -->
<div class="card" id="setup">

<h3>Pre-Trade Checklist</h3>

<label><input type="checkbox" id="c1"> Clear setup</label><br>
<label><input type="checkbox" id="c2"> Risk defined</label><br>
<label><input type="checkbox" id="c3"> No revenge</label><br>
<label><input type="checkbox" id="c4"> Follow system</label>

<br>
<button class="start" onclick="startSession()">Start Session</button>

<p id="lockMsg"></p>

<p>🔥 Streak: <span id="streak">0</span></p>
<p>Level: <span id="level">1</span> | XP: <span id="xp">0</span></p>

<p id="usage"></p>

<a href="https://buy.stripe.com/aFa8wP0XEfQhfb81F16Na01" target="_blank">
<button class="start">Upgrade to Pro — £15/month</button>
</a>

</div>

<!-- SESSION -->
<div class="card hidden" id="session">

<p>Trades: <span id="trades">0</span></p>
<p>Mistakes: <span id="breaks">0</span></p>
<p>Score: <span id="score">100</span>%</p>

<div class="progress"><div id="bar" class="bar"></div></div>

<button class="good" onclick="good()">Executed Discipline</button>

<br>

<select id="reason">
<option value="">Why did you break?</option>
<option>FOMO</option>
<option>Revenge</option>
<option>Boredom</option>
<option>Impulse</option>
</select>

<button class="bad" onclick="bad()">Broke System</button>

<br>
<button onclick="endSession()">End Session</button>

</div>

<!-- RESULT -->
<div class="card hidden" id="result">
<h2 id="resultTitle"></h2>
<h1 id="grade"></h1>
<p id="resultText"></p>
<p id="streakMsg"></p>
<button onclick="location.reload()">New Session</button>
</div>

<!-- JOURNAL (PRO) -->
<div class="card" id="journalBox">
<h3>Behavior Journal (Pro)</h3>

<div id="journalContent">
<p>Total Mistakes: <span id="totalMistakes">0</span></p>
<p>Most Common: <span id="commonMistake">-</span></p>
<p>Trend: <span id="trend">-</span></p>
</div>

<div id="journalLock" class="upgrade hidden">
Upgrade to Pro to unlock insights
</div>
</div>

<!-- HISTORY (PRO) -->
<div class="card" id="historyBox">
<h3>Session History (Pro)</h3>

<div id="history"></div>

<div id="historyLock" class="upgrade hidden">
Upgrade to Pro to view history
</div>
</div>

</div>

<script>
let plan = localStorage.getItem("plan") || "free";
if(window.location.search.includes("pro=true")){
  plan="pro";
  localStorage.setItem("plan","pro");
}

/* DATA */
let freeUsed = +localStorage.getItem("freeUsed") || 0;
let streak = +localStorage.getItem("streak") || 0;
let xp = +localStorage.getItem("xp") || 0;
let level = +localStorage.getItem("level") || 1;
let history = JSON.parse(localStorage.getItem("history") || "[]");

streakEl.innerText = streak;
xpEl.innerText = xp;
levelEl.innerText = level;

/* LOCK (PRO ONLY) */
let today = new Date().toDateString();
let last = localStorage.getItem("lastSessionDate");

if(plan==="pro" && last === today){
  lockMsg.innerText="You are done for today.";
}

/* USAGE */
usage.innerText =
  plan==="free"
  ? "Free sessions left: "+(5-freeUsed)
  : "Unlimited access";

/* SESSION */
let trades=0, breaks=0, score=100;
let sessionReasons=[];

/* ANTI CHEAT */
if(localStorage.getItem("activeSession")==="true"){
  history.push({score:0,date:new Date(),mistakes:5,reasons:["Abandoned"]});
  localStorage.setItem("history", JSON.stringify(history));
  localStorage.removeItem("activeSession");
}

function startSession(){

  // PRO lock only
  if(plan==="pro" && last===today){
    alert("You are done for today.");
    return;
  }

  // FREE LIMIT
  if(plan==="free" && freeUsed>=5){
    alert("You’ve used all 5 free sessions. Upgrade to continue.");
    return;
  }

  if(!c1.checked||!c2.checked||!c3.checked||!c4.checked){
    alert("Complete checklist");
    return;
  }

  localStorage.setItem("activeSession","true");

  setup.classList.add("hidden");
  session.classList.remove("hidden");
}

function good(){ trades++; update(); }

function bad(){
  let r = reason.value;
  if(!r) return alert("Select reason");

  trades++; breaks++; score-=25;
  sessionReasons.push(r);

  update();
}

function update(){
  tradesEl.innerText=trades;
  breaksEl.innerText=breaks;
  scoreEl.innerText=score;
  bar.style.width = score+"%";
}

function endSession(){

  localStorage.removeItem("activeSession");
  localStorage.setItem("lastSessionDate", today);

  if(plan==="free"){
    freeUsed++;
    localStorage.setItem("freeUsed", freeUsed);
  }

  if(score>=75) streak++; else streak=0;
  localStorage.setItem("streak", streak);

  /* XP */
  let earnedXP = Math.max(10, score);
  xp += earnedXP;

  if(xp >= level*100){
    xp = 0;
    level++;
  }

  localStorage.setItem("xp", xp);
  localStorage.setItem("level", level);

  history.push({
    score:score,
    date:new Date().toISOString(),
    mistakes:breaks,
    reasons:sessionReasons
  });

  localStorage.setItem("history", JSON.stringify(history));

  session.classList.add("hidden");
  result.classList.remove("hidden");

  let grade = score>=90?"A":score>=75?"B":score>=50?"C":"D";
  gradeEl.innerText = grade;

  resultTitle.innerText =
    score>=75 ? "Strong Discipline" : "Needs Improvement";

  resultText.innerText =
    score>=75 ? "You followed your system well." :
    "You broke discipline. Review your mistakes.";

  streakMsg.innerText =
    streak>=3 ? "🔥 On fire" :
    streak===0 ? "⚠️ Streak lost" : "";
}

/* PRO LOCK */
if(plan==="free"){
  journalContent.style.display="none";
  journalLock.classList.remove("hidden");

  history.innerHTML="";
  historyLock.classList.remove("hidden");
}
else{
  loadJournal();
  loadHistory();
}

function loadJournal(){
  let total=0, scores=[], counts={};

  history.forEach(h=>{
    total += h.mistakes||0;
    scores.push(h.score);
    (h.reasons||[]).forEach(r=>{
      counts[r]=(counts[r]||0)+1;
    });
  });

  totalMistakes.innerText=total;

  let common="-", max=0;
  for(let k in counts){
    if(counts[k]>max){ max=counts[k]; common=k; }
  }
  commonMistake.innerText=common;

  let trend="No data";
  if(scores.length>=2){
    let a=scores.at(-1), b=scores.at(-2);
    trend = a>b?"Improving":a<b?"Declining":"No change";
  }

  trendEl.innerText=trend;
}

function loadHistory(){
  historyDiv.innerHTML="";
  history.slice().reverse().forEach(h=>{
    historyDiv.innerHTML += `<div>
      ${new Date(h.date).toLocaleDateString()} — ${h.score}%
    </div>`;
  });
}
</script>

</body>
</html>
