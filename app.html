<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack</title>

<style>
body {
  margin:0;
  font-family: Inter, system-ui;
  background: radial-gradient(circle at top,#1e293b,#020617);
  color:#e2e8f0;
}

.container {
  max-width:720px;
  margin:auto;
  padding:40px 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  padding:25px;
  margin-top:20px;
  border-radius:18px;
}

button {
  padding:12px 20px;
  margin:10px 5px;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

.start { background: linear-gradient(135deg,#7c3aed,#6366f1); }

.timer {
  font-size:28px;
  text-align:center;
  margin:15px 0;
  color:#a78bfa;
}

.score {
  font-size:32px;
  text-align:center;
}

.entry {
  margin-top:10px;
  padding:10px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}

.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<h1>TradeTrack</h1>

<!-- SETUP -->
<div class="card" id="setup">

<h3>Set Target</h3>

<select id="target">
  <option value="300">5 Minutes</option>
  <option value="600">10 Minutes</option>
  <option value="900">15 Minutes</option>
  <option value="1800">30 Minutes</option>
</select>

<br>

<button class="start" id="startBtn">Start Session</button>

</div>

<!-- SESSION -->
<div class="card hidden" id="session">

<div class="timer" id="timer">00:00</div>
<div class="score" id="score">0%</div>

<button id="quitBtn">Quit Early</button>

</div>

<!-- RESULT -->
<div class="card hidden" id="result">
<h1 id="grade"></h1>
<p id="resultText"></p>
</div>

<!-- JOURNAL -->
<div class="card">
<h3>Journal</h3>
<div id="journalContent"></div>
</div>

</div>

<script>

/* DATA */
let history = JSON.parse(localStorage.getItem("history") || "[]");

/* SESSION */
let duration = 0;
let targetTime = 300;
let timer;

/* START */
startBtn.onclick = () => {

  targetTime = parseInt(target.value);
  duration = 0;

  setup.classList.add("hidden");
  session.classList.remove("hidden");

  timer = setInterval(()=>{
    duration++;

    let remaining = targetTime - duration;
    if(remaining <= 0){
      finishSession();
      return;
    }

    updateUI(remaining);

  },1000);
};

/* UPDATE */
function updateUI(remaining){
  let m = String(Math.floor(remaining/60)).padStart(2,"0");
  let s = String(remaining%60).padStart(2,"0");
  timerEl.innerText = `${m}:${s}`;

  let percent = Math.floor((duration / targetTime) * 100);
  scoreEl.innerText = percent + "%";
}

/* QUIT */
quitBtn.onclick = () => finishSession();

/* END */
function finishSession(){

  clearInterval(timer);

  let percent = Math.floor((duration / targetTime) * 100);

  history.push({
    percent,
    duration,
    target: targetTime,
    date: Date.now()
  });

  localStorage.setItem("history", JSON.stringify(history));

  session.classList.add("hidden");
  result.classList.remove("hidden");

  grade.innerText =
    percent >= 100 ? "Complete" :
    percent >= 70 ? "Almost" :
    percent >= 40 ? "Weak" : "Failed";

  resultText.innerText =
    `You completed ${percent}% of your target`;

}

/* JOURNAL */
function loadJournal(){
  journalContent.innerHTML = "";
  history.slice().reverse().forEach(h=>{
    journalContent.innerHTML += `
      <div class="entry">
        ${new Date(h.date).toLocaleDateString()} — ${h.percent}%
      </div>
    `;
  });
}
loadJournal();

</script>

</body>
</html>
