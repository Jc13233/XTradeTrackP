<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family: Inter, system-ui;
  background:#020617;
  color:#e2e8f0;
}

/* NAV */
.nav {
  display:flex;
  justify-content:center;
  gap:30px;
  padding:20px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.nav button {
  background:none;
  border:none;
  color:#64748b;
  cursor:pointer;
}

.nav button.active { color:#a78bfa; }

/* LAYOUT */
.container {
  max-width:1100px;
  margin:auto;
  padding:30px 20px;
}

.hero {
  background:rgba(255,255,255,0.04);
  border-radius:20px;
  padding:25px;
  margin-bottom:25px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: 1.5fr 1fr;
  gap:20px;
}

/* CARD */
.card {
  background:rgba(255,255,255,0.04);
  border-radius:16px;
  padding:20px;
}

/* BUTTONS */
button {
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:10px;
}

.primary { background:#22c55e; color:white; width:100%; }
.bad { background:#ef4444; color:white; width:100%; }

.hidden { display:none; }

.small {
  color:#64748b;
  font-size:13px;
}

.timer {
  font-size:18px;
  margin-bottom:10px;
  color:#a78bfa;
}
</style>
</head>

<body>

<div class="nav">
  <button class="active">Dashboard</button>
</div>

<div class="container">

<!-- GRAPH -->
<div class="hero">
  <h3>Performance</h3>
  <canvas id="chart"></canvas>
</div>

<div class="grid">

<!-- SESSION -->
<div class="card">
  <h3>Session</h3>

  <div id="idleState">
    <p class="small">Ready to start</p>
    <button class="primary" onclick="startSession()">Start Session</button>
  </div>

  <div id="activeState" class="hidden">

    <div class="timer" id="timer">00:00</div>
    <h1 id="score">100%</h1>

    <button class="primary" onclick="good()">Stayed Disciplined</button>
    <button class="bad" onclick="bad()">Mistake</button>
    <button onclick="endSession()">End Session</button>

  </div>
</div>

<!-- SIDE -->
<div>

<div class="card">
  <h3>Stats</h3>
  <p>Sessions: <span id="sessions">0</span></p>
</div>

<div class="card">
  <a href="https://buy.stripe.com/aFa8wP0XEfQhfb81F16Na01" target="_blank">
    <button class="primary">Upgrade (£15/mo)</button>
  </a>
  <p id="usage" class="small"></p>
</div>

</div>

</div>

</div>

<script>

/* DATA */
let history = JSON.parse(localStorage.getItem("history")||"[]");
let freeUsed = +localStorage.getItem("freeUsed")||0;

/* UI INIT */
document.getElementById("sessions").innerText = history.length;
document.getElementById("usage").innerText = "Free sessions left: "+(5-freeUsed);

/* SESSION */
let score = 100;
let active = false;
let timerInterval;
let seconds = 0;

/* START */
function startSession(){
  if(freeUsed>=5) return alert("Upgrade required");

  active = true;
  score = 100;
  seconds = 0;

  idleState.classList.add("hidden");
  activeState.classList.remove("hidden");

  updateScore();
  startTimer();
}

/* TIMER */
function startTimer(){
  timerInterval = setInterval(()=>{
    seconds++;

    // reward passive discipline
    score += 1;
    if(score > 100) score = 100;

    updateScore();

    let min = String(Math.floor(seconds/60)).padStart(2,"0");
    let sec = String(seconds%60).padStart(2,"0");
    timer.innerText = `${min}:${sec}`;

  },1000);
}

/* GOOD */
function good(){
  if(!active) return;

  score += 3;
  if(score > 100) score = 100;

  updateScore();
}

/* BAD */
function bad(){
  if(!active) return;

  score -= 25;
  updateScore();

  if(score < 50) endSession();
}

/* END */
function endSession(){
  if(!active) return;

  clearInterval(timerInterval);
  active = false;

  freeUsed++;
  localStorage.setItem("freeUsed", freeUsed);

  history.push({
    score: score,
    date: Date.now()
  });

  localStorage.setItem("history", JSON.stringify(history));

  location.reload();
}

/* UPDATE SCORE */
function updateScore(){
  document.getElementById("score").innerText = score + "%";
}

/* GRAPH */
let last7 = history.slice(-7);

new Chart(document.getElementById("chart"), {
  type:"line",
  data:{
    labels:last7.map((_,i)=>i+1),
    datasets:[{
      data:last7.map(h=>h.score),
      borderColor:"#7c3aed",
      tension:0.4
    }]
  },
  options:{
    plugins:{legend:{display:false}},
    scales:{y:{min:0,max:100}}
  }
});

</script>

</body>
</html>
