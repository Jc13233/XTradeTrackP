<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 40px 20px;
  text-align: center;
}

.card {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 25px;
  margin-top: 20px;
  border-radius: 20px;
}

button {
  padding: 12px 20px;
  margin: 10px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.start { background: linear-gradient(135deg,#4f7cff,#7c3aed); }
.good { background: linear-gradient(135deg,#22c55e,#16a34a); }
.bad { background: linear-gradient(135deg,#ef4444,#dc2626); }

.hidden { display:none; }

.locked {
  color: #ef4444;
  font-weight: bold;
}

.history-item {
  text-align:left;
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.1);
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>TradeTrack</h1>

<!-- SETUP -->
<div class="card" id="setup">

<h3>Pre-Trade Checklist</h3>

<label><input type="checkbox" id="c1"> Clear setup</label>
<label><input type="checkbox" id="c2"> Risk defined</label>
<label><input type="checkbox" id="c3"> No revenge</label>
<label><input type="checkbox" id="c4"> Follow system</label>

<br>
<button class="start" id="startBtn" onclick="startSession()">Start Session</button>

<p id="lockMessage" class="locked"></p>

<p>🔥 Streak: <span id="streak">0</span></p>

<a href="https://buy.stripe.com/aFa8wP0XEfQhfb81F16Na01" target="_blank">
<button class="start">Upgrade — £15/month</button>
</a>

<p id="usage"></p>

</div>

<!-- SESSION -->
<div class="card hidden" id="session">

<p>Trades: <span id="trades">0</span></p>
<p>Mistakes: <span id="breaks">0</span></p>
<p>Score: <span id="score">100</span>%</p>

<button class="good" onclick="good()">Executed Discipline</button>
<button class="bad" onclick="bad()">Broke System</button>

<br>
<button onclick="endSession()">End Session</button>

</div>

<!-- RESULT -->
<div class="card hidden" id="result">

<h2>Session Complete</h2>
<h1 id="grade"></h1>
<p id="resultText"></p>

<button onclick="location.reload()">New Session</button>

</div>

<!-- WEEKLY REPORT -->
<div class="card">

<h3>Weekly Report</h3>

<p>Sessions: <span id="weekSessions">0</span></p>
<p>Average Score: <span id="weekAvg">0</span>%</p>
<p>Mistakes: <span id="weekMistakes">0</span></p>

<p id="weekFeedback"></p>

</div>

<!-- HISTORY -->
<div class="card">

<h3>Session History</h3>
<div id="history"></div>

</div>

</div>

<script>
let today = new Date().toDateString();
let lastSessionDate = localStorage.getItem("lastSessionDate");

let locked = lastSessionDate === today;

if(locked){
  startBtn.disabled = true;
  lockMessage.innerText = "You are done for today. Come back tomorrow.";
}

let freeUsed = localStorage.getItem("freeUsed") || 0;
let streak = localStorage.getItem("streak") || 0;
let history = JSON.parse(localStorage.getItem("history") || "[]");

streakEl.innerText = streak;

function updateUsage(){
  usage.innerText = "Free sessions left: " + (5 - freeUsed);
}

let trades=0, breaks=0, score=100;

function startSession(){
  if(locked){
    alert("Come back tomorrow.");
    return;
  }

  if(freeUsed >= 5){
    alert("Upgrade required");
    return;
  }

  if(!c1.checked||!c2.checked||!c3.checked||!c4.checked){
    alert("Complete checklist");
    return;
  }

  setup.classList.add("hidden");
  session.classList.remove("hidden");
}

function good(){ trades++; update(); }
function bad(){ trades++; breaks++; score-=25; update(); }

function update(){
  tradesEl.innerText = trades;
  breaksEl.innerText = breaks;
  scoreEl.innerText = score;
}

function endSession(){

  localStorage.setItem("lastSessionDate", today);

  freeUsed++;
  localStorage.setItem("freeUsed", freeUsed);

  if(score>=75) streak++; else streak=0;
  localStorage.setItem("streak", streak);

  history.push({
    score: score,
    date: new Date().toISOString(),
    mistakes: breaks
  });

  localStorage.setItem("history", JSON.stringify(history));

  result.classList.remove("hidden");
  session.classList.add("hidden");

  gradeEl.innerText =
    score>=90?"A":score>=75?"B":score>=50?"C":"D";

  resultText.innerText = "Discipline logged. Review your week.";
}

function loadWeekly(){

  let now = new Date();
  let weekAgo = new Date();
  weekAgo.setDate(now.getDate() - 7);

  let weekData = history.filter(h => new Date(h.date) > weekAgo);

  let total = weekData.length;
  let avg = 0;
  let mistakes = 0;

  weekData.forEach(h=>{
    avg += h.score;
    mistakes += h.mistakes || 0;
  });

  avg = total ? Math.round(avg/total) : 0;

  weekSessions.innerText = total;
  weekAvg.innerText = avg;
  weekMistakes.innerText = mistakes;

  let feedback = "No data yet.";

  if(avg >= 85) feedback = "Elite discipline this week.";
  else if(avg >= 70) feedback = "Solid consistency. Keep going.";
  else if(avg >= 50) feedback = "Inconsistent. Tighten rules.";
  else feedback = "You are breaking discipline too often.";

  weekFeedback.innerText = feedback;
}

function loadHistory(){
  historyDiv.innerHTML = "";
  history.slice().reverse().forEach(h=>{
    historyDiv.innerHTML += `<div class="history-item">
      ${new Date(h.date).toLocaleDateString()} — ${h.score}%
    </div>`;
  });
}

updateUsage();
loadWeekly();
loadHistory();
</script>

</body>
</html>
