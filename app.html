<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack</title>
<link rel="icon" href="/favicon2.png">

<style>
body {
<div style="display:flex; align-items:center; gap:12px; padding:15px;">
  <img src="/favicon.png" style="width:36px; border-radius:10px; box-shadow:0 0 10px #00f0ff;">
  <h3 style="margin:0;">TradeTrack</h3>
</div>
</div>
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

/* FADE ANIMATION */
.fade {
  animation: fadeIn 0.4s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 40px 20px;
  text-align: center;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 16px;
  margin-top: 20px;
  box-shadow: 0 0 25px rgba(124,58,237,0.15);
  transition: 0.3s;
}
.card:hover {
  box-shadow: 0 0 40px rgba(124,58,237,0.25);
}

/* BUTTONS */
button {
  padding: 12px 20px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  margin: 6px;
  font-weight: bold;
  color: white;
  transition: all 0.2s ease;
}

.primary { background: linear-gradient(135deg,#4f7cff,#7c3aed); }
.success { background: linear-gradient(135deg,#22c55e,#16a34a); }
.danger { background: linear-gradient(135deg,#ef4444,#dc2626); }

button:hover {
  transform: translateY(-2px) scale(1.04);
  box-shadow: 0 0 20px rgba(124,58,237,0.6);
}

/* STATS */
.stats {
  display: flex;
  justify-content: space-around;
  margin-top: 20px;
}

.stat {
  background: rgba(0,0,0,0.4);
  padding: 15px;
  border-radius: 12px;
  width: 30%;
  transition: 0.3s;
}
.stat:hover {
  transform: scale(1.05);
}

/* INPUT */
textarea {
  width: 100%;
  border-radius: 10px;
  border: none;
  padding: 10px;
  background: #111;
  color: white;
  margin-top: 10px;
}

/* CALENDAR */
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  margin-top: 20px;
}

.day {
  padding: 15px;
  border-radius: 10px;
  background: #111;
  cursor: pointer;
  transition: 0.2s;
}
.day:hover {
  transform: scale(1.08);
}

.green { background:#22c55e; }
.yellow { background:#eab308; }
.red { background:#ef4444; }
.gray { background:#444; }

.rules-box, .journal-box {
  background: #111;
  padding: 15px;
  border-radius: 10px;
  text-align: left;
  white-space: pre-wrap;
  margin-top: 10px;
}

.streak {
  font-size: 18px;
  color: gold;
}

/* LOCK MESSAGE */
.lock-message {
  margin-top: 10px;
  color: #facc15;
  font-weight: bold;
}

/* MODAL */
.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
  animation: fadeIn 0.3s ease;
}

.modal-content {
  background:#0f172a;
  padding:25px;
  border-radius:16px;
  width: 300px;
  box-shadow: 0 0 30px rgba(124,58,237,0.5);
  animation: fadeIn 0.3s ease;
}

.modal-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

<h1>TradeTrack</h1>
<div class="streak">🔥 Streak: <span id="streak">0</span></div>

<!-- NAV -->
<div>
<button class="primary" onclick="showPage('session')">Session</button>
<button class="primary" onclick="showPage('calendar')">Calendar</button>
<button class="primary" onclick="showPage('rules')">Rules</button>
<button class="danger" onclick="resetAll()">Reset</button>
</div>

<!-- RULES -->
<div id="rulesPage" class="card fade" style="display:none;">
<h3>Your Trading Rules</h3>
<textarea id="rulesInput"></textarea>
<button class="primary" onclick="saveRules()">Save Rules</button>
<div class="rules-box" id="rulesDisplay"></div>
</div>

<!-- SESSION -->
<div id="sessionPage" class="card fade">

<div class="rules-box" id="rulesPreview"></div>

<div class="stats">
<div class="stat">Trades<br><span id="trades">0</span></div>
<div class="stat">Mistakes<br><span id="breaks">0</span></div>
<div class="stat">Score<br><span id="score">0</span>%</div>
</div>

<button id="goodBtn" class="success" onclick="followRule()">Executed Discipline</button>
<button id="badBtn" class="danger" onclick="openMistakeModal()">Broke Rule</button>

<div id="lockMsg" class="lock-message"></div>

<textarea id="journalInput" placeholder="Write your journal... (Ctrl + Enter to submit)"></textarea>

<button class="primary" onclick="endSession()">End Session</button>

</div>

<!-- CALENDAR -->
<div id="calendarPage" class="card fade" style="display:none;">
<h3 id="monthTitle"></h3>
<button class="primary" onclick="changeMonth(-1)">⬅</button>
<button class="primary" onclick="changeMonth(1)">➡</button>

<div id="calendar" class="calendar"></div>
<div id="dayDetail"></div>
</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Why did you break your rule?</h3>
    <div class="modal-buttons">
      <button class="danger" onclick="selectMistake('FOMO')">FOMO</button>
      <button class="danger" onclick="selectMistake('Revenge Trading')">Revenge</button>
      <button class="danger" onclick="selectMistake('Overtrading')">Overtrading</button>
      <button class="danger" onclick="selectMistake('Ignored Setup')">Ignored Setup</button>
    </div>
  </div>
</div>

<script>

/* JS — EXACT SAME (unchanged from V29) */

let history = JSON.parse(localStorage.getItem("calendarData")) || {};
let rules = localStorage.getItem("rules") || "";
let streak = parseInt(localStorage.getItem("streak")) || 0;
let currentDate = new Date();

let trades=0, breaks=0, good=0, score=0;
let mistakes=[];
let sessionLocked=false;

function showPage(page){
  document.getElementById("sessionPage").style.display = page==="session"?"block":"none";
  document.getElementById("calendarPage").style.display = page==="calendar"?"block":"none";
  document.getElementById("rulesPage").style.display = page==="rules"?"block":"none";
  if(page==="calendar") renderCalendar();
}

function saveRules(){
  rules = document.getElementById("rulesInput").value;
  localStorage.setItem("rules", rules);
  displayRules();
}

function displayRules(){
  document.getElementById("rulesDisplay").innerText = rules || "No rules set";
  document.getElementById("rulesPreview").innerText = rules || "Set rules before trading";
}
displayRules();

function followRule(){
  if(sessionLocked) return;
  trades++; good++;
  calculateScore(); checkLimit(); updateUI();
}

function openMistakeModal(){
  if(sessionLocked) return;
  document.getElementById("modal").style.display="flex";
}

function selectMistake(type){
  document.getElementById("modal").style.display="none";
  trades++; breaks++; mistakes.push(type);
  calculateScore(); checkLimit(); updateUI();
}

function calculateScore(){
  score = trades===0 ? 0 : Math.round((good/trades)*100);
}

function checkLimit(){
  if(trades>=2){
    sessionLocked=true;

    document.getElementById("lockMsg").innerText =
      "Max trades reached. Write your journal, then press Ctrl + Enter or End Session.";

    document.getElementById("goodBtn").disabled=true;
    document.getElementById("badBtn").disabled=true;
  }
}

document.getElementById("journalInput").addEventListener("keydown", function(e){
  if(e.ctrlKey && e.key === "Enter"){
    if(sessionLocked){
      endSession();
    }
  }
});

function endSession(){

  if(sessionLocked && document.getElementById("journalInput").value.trim()===""){
    alert("Write your journal first");
    return;
  }

  let today = new Date().toISOString().split("T")[0];

  history[today] = {
    score,trades,breaks,
    journal: document.getElementById("journalInput").value,
    mistakes
  };

  localStorage.setItem("calendarData", JSON.stringify(history));

  if(score>=75) streak++;
  else streak=0;

  localStorage.setItem("streak", streak);

  alert("Session saved");

  trades=0; breaks=0; good=0; score=0;
  mistakes=[]; sessionLocked=false;

  document.getElementById("journalInput").value="";
  document.getElementById("lockMsg").innerText="";
  document.getElementById("goodBtn").disabled=false;
  document.getElementById("badBtn").disabled=false;

  updateUI();
}

function resetAll(){
  if(confirm("Delete all data except rules?")){
    localStorage.removeItem("calendarData");
    localStorage.removeItem("streak");
    location.reload();
  }
}

function changeMonth(offset){
  currentDate.setMonth(currentDate.getMonth()+offset);
  renderCalendar();
}

function renderCalendar(){
  let cal=document.getElementById("calendar");
  cal.innerHTML="";

  let year=currentDate.getFullYear();
  let month=currentDate.getMonth();
  let lastDay=new Date(year,month+1,0);

  document.getElementById("monthTitle").innerText =
    new Date(year,month,1).toLocaleString('default',{month:'long',year:'numeric'});

  for(let i=1;i<=lastDay.getDate();i++){
    let date=new Date(year,month,i);
    let key=date.toISOString().split("T")[0];
    let data=history[key];

    let div=document.createElement("div");
    div.classList.add("day");

    if(data){
      if(data.score>=75) div.classList.add("green");
      else if(data.score>=50) div.classList.add("yellow");
      else div.classList.add("red");
    } else div.classList.add("gray");

    div.innerText=i;

    div.onclick=()=>{
      document.getElementById("dayDetail").innerHTML =
        data ? `
        Score: ${data.score}%<br>
        Trades: ${data.trades}<br>
        Mistakes: ${data.breaks}<br>
        Types: ${(data.mistakes||[]).join(", ")}<br><br>
        <div class="journal-box">${data.journal || "None"}</div>`
        : "No data";
    };

    cal.appendChild(div);
  }
}

function updateUI(){
  document.getElementById("trades").innerText=trades;
  document.getElementById("breaks").innerText=breaks;
  document.getElementById("score").innerText=score;
  document.getElementById("streak").innerText=streak;
}

updateUI();

</script>

</body>
</html>
