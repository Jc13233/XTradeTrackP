<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack</title>

<style>
body {
  margin:0;
  font-family: Inter, system-ui;
  background: radial-gradient(circle at top,#1e293b,#020617);
  color:#e2e8f0;
}

.container {
  max-width:720px;
  margin:auto;
  padding:40px 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  padding:25px;
  margin-top:20px;
  border-radius:18px;
}

button {
  padding:10px 16px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.start { background:#7c3aed; color:white; }
.bad { background:#ef4444; }

.entry {
  margin-top:12px;
  padding:12px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}

.pattern {
  padding:10px;
  margin-top:10px;
  border-left:4px solid #7c3aed;
  background:rgba(124,58,237,0.1);
  border-radius:8px;
}

.small {
  font-size:12px;
  color:#94a3b8;
}

.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<h1>TradeTrack</h1>

<!-- SETUP -->
<div class="card" id="setup">
<button class="start" id="startBtn">Start Session</button>
</div>

<!-- SESSION -->
<div class="card hidden" id="session">
<p>Score: <span id="score">100</span>%</p>

<select id="reason">
<option value="">Why break?</option>
<option>FOMO</option>
<option>Revenge</option>
<option>Boredom</option>
<option>Impulse</option>
</select>

<button class="bad" id="badBtn">Bad</button>
<button id="endBtn">End Session</button>
</div>

<!-- RESULT -->
<div class="card hidden" id="result">
<h2 id="grade"></h2>

<textarea id="notes" placeholder="What went wrong?"></textarea>
<button id="saveNoteBtn">Save Journal</button>
</div>

<!-- JOURNAL -->
<div class="card">
<h3>Journal Insights</h3>
<div id="patterns"></div>
</div>

<div class="card">
<h3>Journal</h3>

<div>
<button onclick="filterJournal('all')">All</button>
<button onclick="filterJournal('good')">Good</button>
<button onclick="filterJournal('bad')">Bad</button>
</div>

<div id="journalContent"></div>
</div>

</div>

<script>

/* DATA */
let history = JSON.parse(localStorage.getItem("history") || "[]");

/* SESSION */
let score = 100;
let reasons = [];

/* START */
startBtn.onclick = () => {
  setup.classList.add("hidden");
  session.classList.remove("hidden");
};

/* BAD */
badBtn.onclick = () => {
  let r = reason.value;
  if(!r){ alert("Pick reason"); return; }

  score -= 25;
  reasons.push(r);

  if(score < 50){
    endSession();
  }
};

/* END */
endBtn.onclick = () => endSession();

function endSession(){

  history.push({
    score:score,
    reasons:reasons,
    note:"",
    date:Date.now()
  });

  localStorage.setItem("history", JSON.stringify(history));

  session.classList.add("hidden");
  result.classList.remove("hidden");

  grade.innerText =
    score>=90?"A":
    score>=75?"B":
    score>=50?"C":"D";
}

/* SAVE NOTE */
saveNoteBtn.onclick = () => {
  history[history.length-1].note = notes.value;
  localStorage.setItem("history", JSON.stringify(history));
  location.reload();
};

/* JOURNAL */
function loadJournal(filter="all"){

  journalContent.innerHTML = "";

  let filtered = history.slice().reverse().filter(h=>{
    if(filter==="good") return h.score>=75;
    if(filter==="bad") return h.score<75;
    return true;
  });

  filtered.forEach((h,i)=>{

    let index = history.length - 1 - i;

    journalContent.innerHTML += `
      <div class="entry">
        <strong>${new Date(h.date).toLocaleDateString()}</strong><br>
        Score: ${h.score}%<br>
        Mistakes: ${(h.reasons||[]).join(", ") || "None"}<br>
        <div class="small">${h.note || "No notes"}</div>
        <button onclick="deleteEntry(${index})">Delete</button>
      </div>
    `;
  });
}

function deleteEntry(i){
  history.splice(i,1);
  localStorage.setItem("history", JSON.stringify(history));
  loadJournal();
}

/* PATTERN ENGINE */
function generatePatterns(){

  if(history.length < 3){
    patterns.innerHTML = "<p>Not enough data yet</p>";
    return;
  }

  let mistakeCount = {};
  let lowScore = 0;
  let multiMistakeSessions = 0;

  history.forEach(h=>{
    if(h.score < 75) lowScore++;

    if((h.reasons||[]).length >= 2){
      multiMistakeSessions++;
    }

    (h.reasons||[]).forEach(r=>{
      mistakeCount[r] = (mistakeCount[r]||0)+1;
    });
  });

  let topMistake = Object.keys(mistakeCount)
    .sort((a,b)=>mistakeCount[b]-mistakeCount[a])[0];

  let output = "";

  if(topMistake){
    output += `<div class="pattern">Most common mistake: ${topMistake}</div>`;
  }

  if(lowScore > history.length/2){
    output += `<div class="pattern">You often lose discipline (score <75%)</div>`;
  }

  if(multiMistakeSessions > history.length/3){
    output += `<div class="pattern">You tend to stack mistakes in sessions</div>`;
  }

  if(output === ""){
    output = `<div class="pattern">Strong discipline pattern detected</div>`;
  }

  patterns.innerHTML = output;
}

generatePatterns();

loadJournal();

</script>

</body>
</html>
