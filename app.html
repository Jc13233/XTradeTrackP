<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 40px 20px;
  text-align: center;
}

.card {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 25px;
  margin-top: 20px;
  border-radius: 20px;
}

button {
  padding: 12px 20px;
  margin: 10px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.start { background: linear-gradient(135deg,#4f7cff,#7c3aed); }
.good { background: linear-gradient(135deg,#22c55e,#16a34a); }
.bad { background: linear-gradient(135deg,#ef4444,#dc2626); }

.stat-box {
  display: flex;
  justify-content: space-between;
  margin-top: 15px;
}

.stat {
  width: 23%;
  background: rgba(0,0,0,0.4);
  padding: 10px;
  border-radius: 10px;
}

.progress {
  height: 10px;
  background: #111;
  border-radius: 10px;
  margin-top: 10px;
}

.bar {
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg,#22c55e,#4f7cff);
}

.hidden { display:none; }

.history-item {
  text-align:left;
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.1);
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>TradeTrack</h1>

<!-- SETUP -->
<div class="card" id="setup">

<h3>Pre-Trade Checklist</h3>

<label><input type="checkbox" id="c1"> Clear setup</label>
<label><input type="checkbox" id="c2"> Risk defined</label>
<label><input type="checkbox" id="c3"> No revenge</label>
<label><input type="checkbox" id="c4"> Follow system</label>

<br>
<button class="start" onclick="startSession()">Start Session</button>

<p>🔥 Streak: <span id="streak">0</span></p>

<a href="https://buy.stripe.com/aFa8wP0XEfQhfb81F16Na01" target="_blank">
<button class="start">Upgrade — £15/month</button>
</a>

<p id="usage"></p>

</div>

<!-- SESSION -->
<div class="card hidden" id="session">

<div class="stat-box">
<div class="stat">Trades<br><span id="trades">0</span></div>
<div class="stat">Mistakes<br><span id="breaks">0</span></div>
<div class="stat">Score<br><span id="score">100</span>%</div>
<div class="stat">Best<br><span id="bestStreak">0</span></div>
</div>

<div class="progress"><div id="bar" class="bar"></div></div>

<button class="good" onclick="good()">Executed Discipline</button>
<button class="bad" onclick="bad()">Broke System</button>

<br>
<button onclick="endSession()">End Session</button>

</div>

<!-- RESULT -->
<div class="card hidden" id="result">

<h2>Session Complete</h2>
<h1 id="grade"></h1>
<p id="resultText"></p>

<button onclick="location.reload()">New Session</button>

</div>

<!-- STATS -->
<div class="card">

<h3>Your Stats</h3>

<p>Total Sessions: <span id="totalSessions">0</span></p>
<p>Average Score: <span id="avgScore">0</span>%</p>
<p>Best Streak: <span id="bestStreak2">0</span></p>

</div>

<!-- HISTORY -->
<div class="card">

<h3>Session History</h3>
<div id="history"></div>

</div>

</div>

<script>
let plan = "free";
let freeUsed = localStorage.getItem("freeUsed") || 0;

let streak = localStorage.getItem("streak") || 0;
let bestStreak = localStorage.getItem("bestStreak") || 0;

let history = JSON.parse(localStorage.getItem("history") || "[]");

document.getElementById("streak").innerText = streak;
document.getElementById("bestStreak").innerText = bestStreak;

function updateUsage(){
  document.getElementById("usage").innerText =
    "Free sessions left: " + (5 - freeUsed);
}

let trades=0, breaks=0, score=100;

function startSession(){
  if(freeUsed >= 5){
    alert("Upgrade required");
    return;
  }

  if(!c1.checked||!c2.checked||!c3.checked||!c4.checked){
    alert("Complete checklist");
    return;
  }

  setup.classList.add("hidden");
  session.classList.remove("hidden");
}

function good(){
  trades++;
  update();
}

function bad(){
  trades++;
  breaks++;
  score -= 25;
  update();
}

function update(){
  tradesEl.innerText = trades;
  breaksEl.innerText = breaks;
  scoreEl.innerText = score;
  bar.style.width = score+"%";
}

function endSession(){

  freeUsed++;
  localStorage.setItem("freeUsed", freeUsed);

  let grade="D";
  if(score>=90) grade="A";
  else if(score>=75) grade="B";
  else if(score>=50) grade="C";

  if(score>=75){
    streak++;
    if(streak > bestStreak){
      bestStreak = streak;
      localStorage.setItem("bestStreak", bestStreak);
    }
  } else {
    streak=0;
  }

  localStorage.setItem("streak", streak);

  history.push({
    score: score,
    date: new Date().toLocaleDateString()
  });

  localStorage.setItem("history", JSON.stringify(history));

  result.classList.remove("hidden");
  session.classList.add("hidden");

  gradeEl.innerText = grade;
  resultText.innerText = "Your discipline score: " + score + "%";
}

function loadStats(){
  document.getElementById("totalSessions").innerText = history.length;

  let avg = 0;
  history.forEach(h => avg += h.score);
  avg = history.length ? Math.round(avg/history.length) : 0;

  document.getElementById("avgScore").innerText = avg;
  document.getElementById("bestStreak2").innerText = bestStreak;

  let hDiv = document.getElementById("history");
  hDiv.innerHTML = "";

  history.slice().reverse().forEach(h=>{
    hDiv.innerHTML += `<div class="history-item">
      ${h.date} — Score: ${h.score}%
    </div>`;
  });
}

updateUsage();
loadStats();
</script>

</body>
</html>
