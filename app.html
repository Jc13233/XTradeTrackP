<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:white;
}

.container {
  max-width:700px;
  margin:auto;
  padding:40px 20px;
  text-align:center;
}

.card {
  background:rgba(255,255,255,0.05);
  padding:25px;
  margin-top:20px;
  border-radius:20px;
}

button {
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.start { background:#7c3aed; }
.good { background:#16a34a; }
.bad { background:#dc2626; }

.hidden { display:none; }

.progress {
  height:10px;
  background:#111;
  border-radius:10px;
  margin-top:10px;
  overflow:hidden;
}

.bar {
  height:100%;
  width:100%;
  background:#22c55e;
  transition:0.3s;
}

.upgrade { color:#a78bfa; margin-top:10px; }
</style>
</head>

<body>

<div class="container">

<h1>TradeTrack</h1>

<div class="card" id="setup">

<h3>Checklist</h3>

<label><input type="checkbox" id="c1"> Setup</label><br>
<label><input type="checkbox" id="c2"> Risk</label><br>
<label><input type="checkbox" id="c3"> No revenge</label><br>
<label><input type="checkbox" id="c4"> Follow plan</label>

<br>
<button class="start" id="startBtn">Start Session</button>

<p id="usage"></p>
<p>🔥 Streak: <span id="streak">0</span></p>
<p>⭐ Level: <span id="level">1</span> | XP: <span id="xp">0</span></p>
<p id="lockMsg"></p>

<a href="https://buy.stripe.com/aFa8wP0XEfQhfb81F16Na01" target="_blank">
<button class="start">Upgrade to Pro — £15/month</button>
</a>

</div>

<div class="card hidden" id="session">

<p>Trades: <span id="trades">0</span></p>
<p>Mistakes: <span id="breaks">0</span></p>
<p>Score: <span id="score">100</span>%</p>

<div class="progress"><div id="bar" class="bar"></div></div>

<button class="good" id="goodBtn">Good</button>

<br>

<select id="reason">
<option value="">Why break?</option>
<option>FOMO</option>
<option>Revenge</option>
<option>Boredom</option>
<option>Impulse</option>
</select>

<button class="bad" id="badBtn">Bad</button>

<br>
<button id="endBtn">End Session</button>

</div>

<div class="card">

<h3>Heatmap (Pro)</h3>

<div id="heatmapContent"></div>

<div id="heatmapLock" class="upgrade hidden">
Upgrade to Pro to unlock insights
</div>

</div>

</div>

<script>

/* PLAN */
let plan = localStorage.getItem("plan") || "free";
if(window.location.search.includes("pro=true")){
  plan="pro";
  localStorage.setItem("plan","pro");
}

/* DATA */
let freeUsed = +localStorage.getItem("freeUsed") || 0;
let streak = +localStorage.getItem("streak") || 0;
let lastDate = localStorage.getItem("lastDate");
let history = JSON.parse(localStorage.getItem("history") || "[]");

/* XP SYSTEM */
let xp = +localStorage.getItem("xp") || 0;
let level = +localStorage.getItem("level") || 1;

/* ELEMENTS */
const startBtn = document.getElementById("startBtn");
const goodBtn = document.getElementById("goodBtn");
const badBtn = document.getElementById("badBtn");
const endBtn = document.getElementById("endBtn");

const setup = document.getElementById("setup");
const session = document.getElementById("session");

const tradesEl = document.getElementById("trades");
const breaksEl = document.getElementById("breaks");
const scoreEl = document.getElementById("score");
const bar = document.getElementById("bar");

const usage = document.getElementById("usage");
const streakEl = document.getElementById("streak");
const lockMsg = document.getElementById("lockMsg");

const xpEl = document.getElementById("xp");
const levelEl = document.getElementById("level");

const heatmapContent = document.getElementById("heatmapContent");
const heatmapLock = document.getElementById("heatmapLock");

/* INIT */
streakEl.innerText = streak;
xpEl.innerText = xp;
levelEl.innerText = level;

usage.innerText =
  plan==="free"
  ? "Free sessions left: " + (5-freeUsed)
  : "Unlimited sessions";

/* DAILY LOCK */
let today = new Date().toDateString();
if(plan==="pro" && lastDate === today){
  lockMsg.innerText = "You are done for today.";
}

/* SESSION STATE */
let trades=0, breaks=0, score=100;
let reasons=[];

/* START */
startBtn.onclick = () => {

  if(plan==="pro" && lastDate === today){
    alert("Come back tomorrow.");
    return;
  }

  if(plan==="free" && freeUsed>=5){
    alert("Free limit reached.");
    return;
  }

  if(!c1.checked||!c2.checked||!c3.checked||!c4.checked){
    alert("Complete checklist.");
    return;
  }

  setup.classList.add("hidden");
  session.classList.remove("hidden");
};

/* ACTIONS */
goodBtn.onclick = () => {
  trades++;
  update();
};

badBtn.onclick = () => {
  let r = reason.value;
  if(!r){
    alert("Pick reason.");
    return;
  }

  trades++;
  breaks++;
  score -= 25;
  reasons.push(r);

  update();
};

function update(){
  tradesEl.innerText = trades;
  breaksEl.innerText = breaks;
  scoreEl.innerText = score;
  bar.style.width = score + "%";
}

/* END */
endBtn.onclick = () => {

  if(plan==="free"){
    freeUsed++;
    localStorage.setItem("freeUsed", freeUsed);
  }

  localStorage.setItem("lastDate", today);

  /* STREAK */
  if(score >= 75){
    streak++;
  } else {
    streak = 0;
  }
  localStorage.setItem("streak", streak);

  /* XP LOGIC */
  let gainedXP = Math.max(10, score);
  xp += gainedXP;

  if(xp >= level * 100){
    xp = xp - (level * 100);
    level++;
  }

  localStorage.setItem("xp", xp);
  localStorage.setItem("level", level);

  history.push({
    score: score,
    reasons: reasons
  });

  localStorage.setItem("history", JSON.stringify(history));

  alert("Session complete");
  location.reload();
};

/* HEATMAP */
function loadHeatmap(){

  if(plan==="free"){
    heatmapContent.style.display="none";
    heatmapLock.classList.remove("hidden");
    return;
  }

  let counts = {FOMO:0,Revenge:0,Boredom:0,Impulse:0};

  history.forEach(h=>{
    (h.reasons||[]).forEach(r=>{
      counts[r]++;
    });
  });

  heatmapContent.innerHTML = `
    <div>🔴 FOMO: ${counts.FOMO}</div>
    <div>🟠 Revenge: ${counts.Revenge}</div>
    <div>🟡 Boredom: ${counts.Boredom}</div>
    <div>🔵 Impulse: ${counts.Impulse}</div>
  `;
}

loadHeatmap();

</script>

</body>
</html>
