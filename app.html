<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TradeTrack</title>

<!-- PWA -->
<meta name="theme-color" content="#020617">

<style>
body {
  margin:0;
  font-family: Inter, system-ui;
  background:#020617;
  color:#e2e8f0;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* CONTENT */
.content {
  flex:1;
  overflow-y:auto;
  padding:20px;
}

/* CARDS */
.card {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
}

/* BUTTONS */
button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  font-size:16px;
}

.primary { background:#7c3aed; color:white; }
.bad { background:#ef4444; color:white; }

/* NAV BAR */
.navbar {
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid rgba(255,255,255,0.1);
  background:#020617;
  position:sticky;
  bottom:0;
}

.navbar button {
  background:none;
  color:#94a3b8;
  font-size:14px;
}

.navbar button.active {
  color:#a78bfa;
}

/* PROGRESS */
.progress {
  height:8px;
  background:#020617;
  border-radius:10px;
  margin-top:10px;
}

.bar {
  height:100%;
  background:#7c3aed;
}

/* ENTRY */
.entry {
  padding:12px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  margin-top:10px;
}

/* HIDDEN */
.hidden { display:none; }
</style>
</head>

<body>

<div class="content">

<!-- DASH -->
<div id="dash">

<div class="card">
<h2>Session</h2>
<p>Score: <span id="score">100</span>%</p>

<select id="reason">
<option value="">Why break?</option>
<option>FOMO</option>
<option>Revenge</option>
<option>Boredom</option>
<option>Impulse</option>
</select>

<button class="bad" onclick="bad()">Log Mistake</button>
<button onclick="endSession()">End Session</button>
</div>

<div class="card">
<h3>Stats</h3>
<p>🔥 Streak: <span id="streak">0</span></p>
<p>⭐ Level: <span id="level">1</span></p>
<div class="progress"><div id="xpBar" class="bar"></div></div>
</div>

<div class="card">
<button class="primary" onclick="startSession()">Start Session</button>

<a href="https://buy.stripe.com/aFa8wP0XEfQhfb81F16Na01" target="_blank">
<button class="primary">Upgrade to Pro</button>
</a>

<p id="usage"></p>
</div>

</div>

<!-- JOURNAL -->
<div id="journal" class="hidden">

<div class="card">
<h2>Journal</h2>

<button onclick="filter('all')">All</button>
<button onclick="filter('good')">Good</button>
<button onclick="filter('bad')">Bad</button>

<div id="journalList"></div>
</div>

</div>

<!-- INSIGHTS -->
<div id="insights" class="hidden">

<div class="card">
<h2>Insights</h2>
<div id="insightBox"></div>
</div>

<div class="card">
<h3>Weekly</h3>
<p id="weekly"></p>
</div>

</div>

</div>

<!-- NAV -->
<div class="navbar">
<button onclick="showTab('dash')" id="navDash" class="active">Home</button>
<button onclick="showTab('journal')" id="navJournal">Journal</button>
<button onclick="showTab('insights')" id="navInsights">Insights</button>
</div>

<script>

/* TAB */
function showTab(tab){
  ["dash","journal","insights"].forEach(id=>{
    document.getElementById(id).classList.add("hidden");
    document.getElementById("nav"+id.charAt(0).toUpperCase()+id.slice(1)).classList.remove("active");
  });

  document.getElementById(tab).classList.remove("hidden");
  document.getElementById("nav"+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add("active");
}

/* DATA */
let history = JSON.parse(localStorage.getItem("history")||"[]");
let streak = +localStorage.getItem("streak")||0;
let xp = +localStorage.getItem("xp")||0;
let level = +localStorage.getItem("level")||1;
let freeUsed = +localStorage.getItem("freeUsed")||0;

/* INIT */
streak.innerText = streak;
level.innerText = level;
xpBar.style.width = (xp/(level*100))*100+"%";
usage.innerText = "Free left: "+(5-freeUsed);

/* SESSION */
let score = 100;
let reasons = [];

function startSession(){
  score = 100;
  reasons = [];
  scoreEl.innerText = score;
}

function bad(){
  let r = reason.value;
  if(!r) return alert("Pick reason");

  score -= 25;
  reasons.push(r);
  scoreEl.innerText = score;

  if(score < 50){
    alert("Hard stop triggered");
    endSession();
  }
}

function endSession(){

  if(freeUsed>=5) return alert("Upgrade required");

  freeUsed++;
  localStorage.setItem("freeUsed", freeUsed);

  if(score>=75) streak++; else streak=0;
  localStorage.setItem("streak", streak);

  xp += score;
  if(xp >= level*100){
    xp -= level*100;
    level++;
  }

  localStorage.setItem("xp", xp);
  localStorage.setItem("level", level);

  history.push({score,reasons,date:Date.now()});
  localStorage.setItem("history", JSON.stringify(history));

  location.reload();
}

/* JOURNAL */
function loadJournal(type="all"){
  journalList.innerHTML="";

  history.slice().reverse().filter(h=>{
    if(type==="good") return h.score>=75;
    if(type==="bad") return h.score<75;
    return true;
  }).forEach(h=>{
    journalList.innerHTML+=`
      <div class="entry">
        ${new Date(h.date).toLocaleDateString()} — ${h.score}%<br>
        ${h.reasons.join(", ")}
      </div>`;
  });
}

function filter(t){ loadJournal(t); }
loadJournal();

/* INSIGHTS */
function insights(){
  if(history.length<3){
    insightBox.innerText="Not enough data";
    return;
  }

  let count={};
  history.forEach(h=>{
    h.reasons.forEach(r=>{
      count[r]=(count[r]||0)+1;
    });
  });

  let top = Object.keys(count).sort((a,b)=>count[b]-count[a])[0];

  insightBox.innerText = "Main issue: "+top;
}
insights();

/* WEEKLY */
function weekly(){
  let now=Date.now();
  let w=7*24*60*60*1000;

  let week = history.filter(h=>h.date>now-w);

  let avg = week.length
    ? Math.round(week.reduce((a,b)=>a+b.score,0)/week.length)
    : 0;

  document.getElementById("weekly").innerText =
    "This week avg: "+avg+"%";
}
weekly();

</script>

</body>
</html>
