<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack</title>

<style>
body {
  margin:0;
  font-family: Inter, system-ui;
  background:#020617;
  color:#e2e8f0;
}

/* NAV */
.nav {
  display:flex;
  justify-content:center;
  gap:20px;
  padding:20px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.nav button {
  background:none;
  color:#94a3b8;
  border:none;
  font-size:16px;
  cursor:pointer;
}

.nav button.active {
  color:#a78bfa;
}

/* CONTAINER */
.container {
  max-width:700px;
  margin:auto;
  padding:20px;
}

/* CARD */
.card {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  padding:20px;
  margin-top:20px;
}

/* BUTTONS */
button {
  padding:10px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.primary { background:#7c3aed; color:white; }
.bad { background:#ef4444; color:white; }

/* PROGRESS */
.progress {
  height:8px;
  background:#020617;
  border-radius:10px;
  margin-top:10px;
}

.bar {
  height:100%;
  background:#7c3aed;
}

/* HIDDEN */
.hidden { display:none; }

/* ENTRY */
.entry {
  padding:12px;
  margin-top:10px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}

.insight {
  padding:10px;
  margin-top:10px;
  border-left:3px solid #7c3aed;
  background:rgba(124,58,237,0.1);
  border-radius:8px;
}

.small { color:#94a3b8; font-size:13px; }
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <button onclick="showTab('dash')" class="active" id="tabDash">Dashboard</button>
  <button onclick="showTab('journal')" id="tabJournal">Journal</button>
  <button onclick="showTab('insights')" id="tabInsights">Insights</button>
</div>

<div class="container">

<!-- DASHBOARD -->
<div id="dash">

<div class="card">
<h2>Session</h2>

<!-- IDLE -->
<div id="idleState">
  <p class="small">No active session</p>
  <button class="primary" onclick="startSession()">Start Session</button>
</div>

<!-- ACTIVE -->
<div id="activeState" class="hidden">
  <p>Score: <span id="score">100</span>%</p>

  <select id="reason">
    <option value="">Why break?</option>
    <option>FOMO</option>
    <option>Revenge</option>
    <option>Boredom</option>
    <option>Impulse</option>
  </select>

  <br><br>

  <button class="bad" onclick="bad()">Mistake</button>
  <button onclick="endSession()">End Session</button>
</div>

</div>

<div class="card">
<h3>Stats</h3>
<p>🔥 Streak: <span id="streak">0</span></p>
<p>⭐ Level: <span id="level">1</span></p>
<div class="progress"><div id="xpBar" class="bar"></div></div>
</div>

<div class="card">
<a href="https://buy.stripe.com/aFa8wP0XEfQhfb81F16Na01" target="_blank">
<button class="primary">Upgrade to Pro (£15/mo)</button>
</a>

<p id="usage"></p>
</div>

</div>

<!-- JOURNAL -->
<div id="journal" class="hidden">
<div class="card">
<h2>Journal</h2>

<button onclick="filter('all')">All</button>
<button onclick="filter('good')">Good</button>
<button onclick="filter('bad')">Bad</button>

<div id="journalList"></div>
</div>
</div>

<!-- INSIGHTS -->
<div id="insights" class="hidden">

<div class="card">
<h2>Insights</h2>
<div id="insightBox"></div>
</div>

<div class="card">
<h3>Weekly</h3>
<p id="weekly"></p>
</div>

</div>

</div>

<script>

/* TAB */
function showTab(tab){
  ["dash","journal","insights"].forEach(id=>{
    document.getElementById(id).classList.add("hidden");
    document.getElementById("tab"+id.charAt(0).toUpperCase()+id.slice(1)).classList.remove("active");
  });
  document.getElementById(tab).classList.remove("hidden");
  document.getElementById("tab"+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add("active");
}

/* DATA */
let history = JSON.parse(localStorage.getItem("history")||"[]");
let streak = +localStorage.getItem("streak")||0;
let xp = +localStorage.getItem("xp")||0;
let level = +localStorage.getItem("level")||1;
let freeUsed = +localStorage.getItem("freeUsed")||0;

/* ELEMENTS */
const streakEl = document.getElementById("streak");
const levelEl = document.getElementById("level");
const xpBar = document.getElementById("xpBar");
const usage = document.getElementById("usage");
const scoreEl = document.getElementById("score");
const reason = document.getElementById("reason");

/* INIT */
streakEl.innerText = streak;
levelEl.innerText = level;
xpBar.style.width = (xp/(level*100))*100+"%";
usage.innerText = "Free sessions left: "+(5-freeUsed);

/* SESSION STATE */
let score = 100;
let reasons = [];
let active = false;

/* START */
function startSession(){

  if(freeUsed>=5){
    alert("Upgrade required");
    return;
  }

  score = 100;
  reasons = [];
  active = true;

  document.getElementById("idleState").classList.add("hidden");
  document.getElementById("activeState").classList.remove("hidden");

  scoreEl.innerText = score;
}

/* MISTAKE */
function bad(){
  if(!active) return;

  let r = reason.value;
  if(!r) return alert("Pick reason");

  score -= 25;
  reasons.push(r);
  scoreEl.innerText = score;

  if(score < 50){
    alert("Hard stop triggered");
    endSession();
  }
}

/* END */
function endSession(){
  if(!active) return;

  active = false;

  freeUsed++;
  localStorage.setItem("freeUsed", freeUsed);

  if(score>=75) streak++; else streak=0;
  localStorage.setItem("streak", streak);

  xp += score;
  if(xp >= level*100){
    xp -= level*100;
    level++;
  }

  localStorage.setItem("xp", xp);
  localStorage.setItem("level", level);

  history.push({ score, reasons, date:Date.now() });
  localStorage.setItem("history", JSON.stringify(history));

  location.reload();
}

/* JOURNAL */
function loadJournal(type="all"){
  const journalList = document.getElementById("journalList");
  journalList.innerHTML = "";

  history.slice().reverse().filter(h=>{
    if(type==="good") return h.score>=75;
    if(type==="bad") return h.score<75;
    return true;
  }).forEach(h=>{
    journalList.innerHTML += `
      <div class="entry">
        ${new Date(h.date).toLocaleDateString()} — ${h.score}%<br>
        <span class="small">${h.reasons.join(", ")}</span>
      </div>
    `;
  });
}

function filter(t){ loadJournal(t); }
loadJournal();

/* INSIGHTS */
function insights(){
  if(history.length<3){
    document.getElementById("insightBox").innerText="Not enough data";
    return;
  }

  let count={};
  history.forEach(h=>{
    h.reasons.forEach(r=>{
      count[r]=(count[r]||0)+1;
    });
  });

  let top = Object.keys(count).sort((a,b)=>count[b]-count[a])[0];

  document.getElementById("insightBox").innerHTML =
    `<div class="insight">Main issue: ${top}</div>`;
}
insights();

/* WEEKLY */
function weekly(){
  let now=Date.now();
  let w=7*24*60*60*1000;

  let week = history.filter(h=>h.date>now-w);

  let avg = week.length
    ? Math.round(week.reduce((a,b)=>a+b.score,0)/week.length)
    : 0;

  document.getElementById("weekly").innerText =
    "This week avg: "+avg+"%";
}
weekly();

</script>

</body>
</html>
