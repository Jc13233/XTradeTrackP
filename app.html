<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 40px 20px;
  text-align: center;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 16px;
  margin-top: 20px;
}

button {
  padding: 12px 18px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  margin: 5px;
}

.start { background:#4f7cff; color:white; }
.good { background:#22c55e; }
.bad { background:#ef4444; }

/* CALENDAR */
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  margin-top: 20px;
}

.day {
  padding: 15px;
  background: #111;
  border-radius: 10px;
  cursor: pointer;
}

.green { background:#22c55e; }
.red { background:#ef4444; }
.gray { background:#444; }
</style>
</head>

<body>

<div class="container">

<h1>TradeTrack</h1>

<!-- NAV -->
<div>
<button onclick="showPage('app')">App</button>
<button onclick="showPage('calendar')">Calendar</button>
</div>

<!-- APP -->
<div id="appPage" class="card">

<h3>Session</h3>

<button class="good" onclick="logDay('good')">Good Session</button>
<button class="bad" onclick="logDay('bad')">Bad Session</button>

<p id="todayStatus"></p>

</div>

<!-- CALENDAR -->
<div id="calendarPage" class="card" style="display:none;">

<h3>Discipline Calendar</h3>

<div id="calendar" class="calendar"></div>

</div>

</div>

<script>

/* NAV */
function showPage(page){
  document.getElementById("appPage").style.display =
    page==="app" ? "block" : "none";

  document.getElementById("calendarPage").style.display =
    page==="calendar" ? "block" : "none";
}

/* STORAGE */
let history = JSON.parse(localStorage.getItem("calendarData")) || {};

/* TODAY */
function getToday(){
  return new Date().toISOString().split("T")[0];
}

/* LOG DAY */
function logDay(type){
  let today = getToday();
  history[today] = type;
  localStorage.setItem("calendarData", JSON.stringify(history));
  updateToday();
  renderCalendar();
}

/* UPDATE TODAY TEXT */
function updateToday(){
  let today = getToday();
  let status = history[today];

  document.getElementById("todayStatus").innerText =
    status === "good" ? "Today: Disciplined"
    : status === "bad" ? "Today: Broke rules"
    : "No session logged today";
}

/* CALENDAR */
function renderCalendar(){
  let cal = document.getElementById("calendar");
  cal.innerHTML = "";

  for(let i=1;i<=30;i++){
    let date = new Date();
    date.setDate(i);
    let key = date.toISOString().split("T")[0];

    let div = document.createElement("div");
    div.classList.add("day");

    if(history[key]==="good") div.classList.add("green");
    else if(history[key]==="bad") div.classList.add("red");
    else div.classList.add("gray");

    div.innerText = i;

    cal.appendChild(div);
  }
}

/* INIT */
updateToday();
renderCalendar();

</script>

</body>
</html>
