<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 40px 20px;
  text-align: center;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 16px;
  margin-top: 20px;
}

button {
  padding: 10px 16px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  margin: 5px;
}

.good { background:#22c55e; }
.bad { background:#ef4444; }

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  margin-top: 20px;
}

.day {
  padding: 15px;
  border-radius: 10px;
  background: #111;
  cursor: pointer;
  transition: 0.2s;
}

.day:hover {
  transform: scale(1.05);
}

.green { background:#22c55e; }
.red { background:#ef4444; }
.gray { background:#444; }

.stats {
  display: flex;
  justify-content: space-around;
  margin-top: 20px;
}

.stat {
  background: rgba(0,0,0,0.4);
  padding: 15px;
  border-radius: 12px;
  width: 30%;
}
</style>
</head>

<body>

<div class="container">

<h1>TradeTrack</h1>

<!-- NAV -->
<div>
<button onclick="showPage('app')">Session</button>
<button onclick="showPage('calendar')">Calendar</button>
</div>

<!-- SESSION -->
<div id="appPage" class="card">

<h3>Log Today</h3>

<button class="good" onclick="logDay('good')">Executed Discipline</button>
<button class="bad" onclick="logDay('bad')">Broke Your System</button>

<p id="todayStatus"></p>

</div>

<!-- CALENDAR -->
<div id="calendarPage" class="card" style="display:none;">

<h3 id="monthTitle"></h3>

<button onclick="changeMonth(-1)">⬅</button>
<button onclick="changeMonth(1)">➡</button>

<div class="stats">
<div class="stat">Days<br><span id="days"></span></div>
<div class="stat">Good %<br><span id="goodRate"></span></div>
<div class="stat">Bad Days<br><span id="badDays"></span></div>
</div>

<div id="calendar" class="calendar"></div>

<p id="dayDetail"></p>

</div>

</div>

<script>

let history = JSON.parse(localStorage.getItem("calendarData")) || {};
let currentDate = new Date();

/* NAV */
function showPage(page){
  document.getElementById("appPage").style.display =
    page==="app" ? "block" : "none";

  document.getElementById("calendarPage").style.display =
    page==="calendar" ? "block" : "none";

  if(page==="calendar") renderCalendar();
}

/* DATE HELPERS */
function formatDate(date){
  return date.toISOString().split("T")[0];
}

/* LOG DAY */
function logDay(type){
  let today = formatDate(new Date());
  history[today] = type;
  localStorage.setItem("calendarData", JSON.stringify(history));
  updateToday();
}

/* TODAY TEXT */
function updateToday(){
  let today = formatDate(new Date());
  let status = history[today];

  document.getElementById("todayStatus").innerText =
    status==="good" ? "Today: Disciplined"
    : status==="bad" ? "Today: Broke rules"
    : "No session logged today";
}

/* MONTH NAV */
function changeMonth(offset){
  currentDate.setMonth(currentDate.getMonth()+offset);
  renderCalendar();
}

/* CALENDAR */
function renderCalendar(){

  let cal = document.getElementById("calendar");
  cal.innerHTML = "";

  let year = currentDate.getFullYear();
  let month = currentDate.getMonth();

  let firstDay = new Date(year, month, 1);
  let lastDay = new Date(year, month+1, 0);

  document.getElementById("monthTitle").innerText =
    firstDay.toLocaleString('default', { month: 'long', year: 'numeric' });

  let good=0, bad=0, total=0;

  for(let i=1;i<=lastDay.getDate();i++){

    let date = new Date(year, month, i);
    let key = formatDate(date);

    let div = document.createElement("div");
    div.classList.add("day");

    if(history[key]==="good"){
      div.classList.add("green");
      good++;
    }
    else if(history[key]==="bad"){
      div.classList.add("red");
      bad++;
    }
    else{
      div.classList.add("gray");
    }

    total++;
    div.innerText = i;

    div.onclick = () => {
      document.getElementById("dayDetail").innerText =
        history[key]==="good" ? "Disciplined day"
        : history[key]==="bad" ? "Broke rules"
        : "No data";
    };

    cal.appendChild(div);
  }

  /* STATS */
  document.getElementById("days").innerText = total;
  document.getElementById("badDays").innerText = bad;
  document.getElementById("goodRate").innerText =
    total ? Math.round((good/total)*100)+"%" : "0%";
}

/* INIT */
updateToday();

</script>

</body>
</html>
