<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  overflow-x: hidden;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 40px 20px;
  text-align: center;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 16px;
  margin-top: 20px;
  backdrop-filter: blur(12px);
  animation: fadeIn 0.4s ease;
}

/* 🔥 BUTTONS */
button {
  padding: 12px 20px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  margin: 6px;
  font-weight: bold;
  color: white;
  position: relative;
  overflow: hidden;
  transition: all 0.2s ease;
}

.primary {
  background: linear-gradient(135deg,#4f7cff,#7c3aed);
  box-shadow: 0 0 12px rgba(124,58,237,0.5);
}
.success {
  background: linear-gradient(135deg,#22c55e,#16a34a);
  box-shadow: 0 0 12px rgba(34,197,94,0.5);
}
.danger {
  background: linear-gradient(135deg,#ef4444,#dc2626);
  box-shadow: 0 0 12px rgba(239,68,68,0.5);
}

button:hover {
  transform: translateY(-2px) scale(1.02);
}
button:active {
  transform: scale(0.95);
}

/* ripple */
button::after {
  content: "";
  position: absolute;
  width: 0;
  height: 0;
  background: rgba(255,255,255,0.3);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  top: 50%;
  left: 50%;
  opacity: 0;
}
button:active::after {
  width: 200px;
  height: 200px;
  opacity: 1;
  transition: 0.4s;
}

/* CALENDAR */
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  margin-top: 20px;
  animation: fadeIn 0.5s ease;
}

.day {
  padding: 15px;
  border-radius: 10px;
  background: #111;
  cursor: pointer;
  transition: 0.2s;
}

.day:hover {
  transform: scale(1.08);
}

.green { background:#22c55e; }
.yellow { background:#eab308; }
.red { background:#ef4444; }
.gray { background:#444; }

/* STATS */
.stats {
  display: flex;
  justify-content: space-around;
  margin-top: 20px;
}

.stat {
  background: rgba(0,0,0,0.4);
  padding: 15px;
  border-radius: 12px;
  width: 30%;
}

/* ANIMATIONS */
@keyframes fadeIn {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

.pulse {
  animation: pulse 0.4s ease;
}
</style>
</head>

<body>

<div class="container">

<h1>TradeTrack</h1>

<!-- NAV -->
<div>
<button class="primary" onclick="showPage('session')">Session</button>
<button class="primary" onclick="showPage('calendar')">Calendar</button>
<button class="danger" onclick="resetAll()">Reset</button>
</div>

<!-- SESSION -->
<div id="sessionPage" class="card">

<h3>Live Session</h3>

<div class="stats">
<div class="stat">Trades<br><span id="trades">0</span></div>
<div class="stat">Mistakes<br><span id="breaks">0</span></div>
<div class="stat">Score<br><span id="score">100</span>%</div>
</div>

<br>

<button class="success" onclick="followRule()">Executed Discipline</button>
<button class="danger" onclick="breakRule()">Broke Your System</button>

<br><br>

<button class="primary" onclick="endSession()">End Session</button>

</div>

<!-- CALENDAR -->
<div id="calendarPage" class="card" style="display:none;">

<h3 id="monthTitle"></h3>

<button class="primary" onclick="changeMonth(-1)">⬅</button>
<button class="primary" onclick="changeMonth(1)">➡</button>

<div class="stats">
<div class="stat">Days<br><span id="days"></span></div>
<div class="stat">Avg Score<br><span id="avgScore"></span></div>
<div class="stat">Bad Days<br><span id="badDays"></span></div>
</div>

<div id="calendar" class="calendar"></div>

<div id="dayDetail" style="margin-top:20px;"></div>

</div>

</div>

<script>

/* DATA */
let history = JSON.parse(localStorage.getItem("calendarData")) || {};
let currentDate = new Date();

let trades=0, breaks=0, score=100;

/* NAV TRANSITION */
function showPage(page){
  document.getElementById("sessionPage").style.display =
    page==="session" ? "block" : "none";

  document.getElementById("calendarPage").style.display =
    page==="calendar" ? "block" : "none";

  if(page==="calendar") renderCalendar();
}

/* NUMBER ANIMATION */
function animateValue(id, start, end) {
  let duration = 200;
  let startTime = null;

  function step(timestamp){
    if(!startTime) startTime = timestamp;
    let progress = timestamp - startTime;
    let value = Math.floor(start + (end-start)*(progress/duration));
    document.getElementById(id).innerText = value;
    if(progress < duration) requestAnimationFrame(step);
    else document.getElementById(id).innerText = end;
  }

  requestAnimationFrame(step);
}

/* SESSION */
function followRule(){
  trades++;
  animateValue("trades", trades-1, trades);
}

function breakRule(){
  trades++;
  breaks++;
  score -= 25;

  animateValue("trades", trades-1, trades);
  animateValue("breaks", breaks-1, breaks);
  animateValue("score", score+25, score);

  document.getElementById("score").classList.add("pulse");
  setTimeout(()=>document.getElementById("score").classList.remove("pulse"),400);
}

/* END */
function endSession(){

  let grade="D";
  if(score>=90) grade="A";
  else if(score>=75) grade="B";
  else if(score>=50) grade="C";

  let today = new Date().toISOString().split("T")[0];

  history[today] = {score,trades,breaks,grade};

  localStorage.setItem("calendarData", JSON.stringify(history));

  alert("Session saved.");

  trades=0; breaks=0; score=100;
  document.getElementById("trades").innerText=0;
  document.getElementById("breaks").innerText=0;
  document.getElementById("score").innerText=100;
}

/* RESET */
function resetAll(){
  if(confirm("Delete all data?")){
    localStorage.clear();
    location.reload();
  }
}

/* CALENDAR */
function changeMonth(offset){
  currentDate.setMonth(currentDate.getMonth()+offset);
  renderCalendar();
}

function renderCalendar(){

  let cal = document.getElementById("calendar");
  cal.innerHTML="";

  let year = currentDate.getFullYear();
  let month = currentDate.getMonth();
  let lastDay = new Date(year, month+1, 0);

  document.getElementById("monthTitle").innerText =
    new Date(year,month,1).toLocaleString('default',{month:'long',year:'numeric'});

  let total=0,totalScore=0,bad=0;

  for(let i=1;i<=lastDay.getDate();i++){

    let date = new Date(year,month,i);
    let key = date.toISOString().split("T")[0];
    let data = history[key];

    let div=document.createElement("div");
    div.classList.add("day");

    if(data){
      total++;
      totalScore+=data.score;

      if(data.score>=75) div.classList.add("green");
      else if(data.score>=50) div.classList.add("yellow");
      else {div.classList.add("red"); bad++;}
    } else div.classList.add("gray");

    div.innerText=i;

    div.onclick=()=>{
      document.getElementById("dayDetail").innerHTML =
        data ? `<b>Score:</b> ${data.score}%<br>
                <b>Trades:</b> ${data.trades}<br>
                <b>Mistakes:</b> ${data.breaks}<br>
                <b>Grade:</b> ${data.grade}`
             : "No data";
    };

    cal.appendChild(div);
  }

  document.getElementById("days").innerText=total;
  document.getElementById("badDays").innerText=bad;
  document.getElementById("avgScore").innerText =
    total ? Math.round(totalScore/total)+"%" : "0%";
}

</script>

</body>
</html>
