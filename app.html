<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack</title>

<style>
body {
  margin:0;
  font-family: Inter, system-ui;
  background: radial-gradient(circle at top,#1e293b,#020617);
  color:#e2e8f0;
}

.container {
  max-width:800px;
  margin:auto;
  padding:40px 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  padding:25px;
  margin-top:20px;
  border-radius:18px;
}

button {
  padding:10px 16px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.start { background:#7c3aed; color:white; }
.good { background:#22c55e; }
.bad { background:#ef4444; }

.entry {
  margin-top:12px;
  padding:12px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}

.small { font-size:12px; color:#94a3b8; }

.pattern {
  padding:10px;
  margin-top:10px;
  border-left:4px solid #7c3aed;
  background:rgba(124,58,237,0.1);
  border-radius:8px;
}

.progress {
  height:10px;
  background:#020617;
  border-radius:10px;
  margin-top:10px;
}

.bar {
  height:100%;
  background:#7c3aed;
}

.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<h1>TradeTrack</h1>

<!-- STATS -->
<div class="card">
<p>🔥 Streak: <span id="streak">0</span></p>
<p>⭐ Level: <span id="level">1</span></p>
<div class="progress"><div id="xpBar" class="bar"></div></div>
<p id="usage"></p>
</div>

<!-- WEEKLY -->
<div class="card">
<h3>Weekly Performance</h3>
<p id="weeklyStats"></p>
<p id="comparison"></p>
</div>

<!-- INSIGHTS -->
<div class="card">
<h3>Insights</h3>
<div id="insights"></div>
</div>

<!-- SETUP -->
<div class="card" id="setup">
<button class="start" id="startBtn">Start Session</button>

<a href="https://buy.stripe.com/aFa8wP0XEfQhfb81F16Na01" target="_blank">
<button class="start">Upgrade to Pro</button>
</a>
</div>

<!-- SESSION -->
<div class="card hidden" id="session">
<p>Score: <span id="score">100</span>%</p>

<select id="reason">
<option value="">Why break?</option>
<option>FOMO</option>
<option>Revenge</option>
<option>Boredom</option>
<option>Impulse</option>
</select>

<button class="bad" id="badBtn">Bad</button>
<button id="endBtn">End Session</button>
</div>

<!-- RESULT -->
<div class="card hidden" id="result">
<h2 id="grade"></h2>
<textarea id="notes" placeholder="What went wrong?"></textarea>
<button id="saveNoteBtn">Save Journal</button>
</div>

<!-- JOURNAL INSIGHTS -->
<div class="card">
<h3>Journal Patterns</h3>
<div id="patterns"></div>
</div>

<!-- JOURNAL -->
<div class="card">
<h3>Journal</h3>

<button onclick="filterJournal('all')">All</button>
<button onclick="filterJournal('good')">Good</button>
<button onclick="filterJournal('bad')">Bad</button>

<div id="journalContent"></div>
</div>

</div>

<script>

/* PLAN */
let plan = localStorage.getItem("plan") || "free";
let freeUsed = +localStorage.getItem("freeUsed") || 0;

/* DATA */
let history = JSON.parse(localStorage.getItem("history") || "[]");
let streak = +localStorage.getItem("streak") || 0;
let xp = +localStorage.getItem("xp") || 0;
let level = +localStorage.getItem("level") || 1;

/* UI */
streakEl.innerText = streak;
levelEl.innerText = level;
xpBar.style.width = (xp/(level*100))*100 + "%";

usage.innerText =
  plan==="free"
  ? `Free sessions left: ${5-freeUsed}`
  : "Pro unlocked";

/* SESSION */
let score = 100;
let reasons = [];

startBtn.onclick = () => {

  if(plan==="free" && freeUsed >= 5){
    alert("Upgrade to continue");
    return;
  }

  setup.classList.add("hidden");
  session.classList.remove("hidden");
};

badBtn.onclick = () => {
  let r = reason.value;
  if(!r){ alert("Pick reason"); return; }

  score -= 25;
  reasons.push(r);
  scoreEl.innerText = score;

  if(score < 50){
    alert("Hard stop triggered");
    endSession();
  }
};

endBtn.onclick = () => endSession();

function endSession(){

  if(plan==="free") freeUsed++;
  localStorage.setItem("freeUsed", freeUsed);

  if(score>=75){ streak++; } else { streak=0; }
  localStorage.setItem("streak", streak);

  xp += score;
  if(xp >= level*100){
    xp -= level*100;
    level++;
  }

  localStorage.setItem("xp", xp);
  localStorage.setItem("level", level);

  history.push({
    score:score,
    reasons:reasons,
    note:"",
    date:Date.now()
  });

  localStorage.setItem("history", JSON.stringify(history));

  session.classList.add("hidden");
  result.classList.remove("hidden");

  grade.innerText =
    score>=90?"A":
    score>=75?"B":
    score>=50?"C":"D";
}

/* SAVE NOTE */
saveNoteBtn.onclick = () => {
  history[history.length-1].note = notes.value;
  localStorage.setItem("history", JSON.stringify(history));
  location.reload();
};

/* JOURNAL */
function loadJournal(filter="all"){
  journalContent.innerHTML = "";

  history.slice().reverse().filter(h=>{
    if(filter==="good") return h.score>=75;
    if(filter==="bad") return h.score<75;
    return true;
  }).forEach((h,i)=>{

    let index = history.length-1-i;

    journalContent.innerHTML += `
      <div class="entry">
        <strong>${new Date(h.date).toLocaleDateString()}</strong><br>
        Score: ${h.score}%<br>
        ${(h.reasons||[]).join(", ")}<br>
        <div class="small">${h.note || "No notes"}</div>
        <button onclick="deleteEntry(${index})">Delete</button>
      </div>
    `;
  });
}

function deleteEntry(i){
  history.splice(i,1);
  localStorage.setItem("history", JSON.stringify(history));
  loadJournal();
}

function filterJournal(type){ loadJournal(type); }

/* INSIGHTS */
function insightsEngine(){

  if(history.length < 3){
    insights.innerHTML = "Not enough data";
    return;
  }

  let count = {};
  history.forEach(h=>{
    (h.reasons||[]).forEach(r=>{
      count[r] = (count[r]||0)+1;
    });
  });

  let top = Object.keys(count).sort((a,b)=>count[b]-count[a])[0];

  insights.innerHTML = `Main issue: ${top}`;
}

/* PATTERNS */
function patternsEngine(){

  let low = history.filter(h=>h.score<75).length;

  if(low > history.length/2){
    patterns.innerHTML = "You often lose discipline";
  } else {
    patterns.innerHTML = "Stable discipline pattern";
  }
}

/* WEEKLY */
function weeklyReport(){

  let now = Date.now();
  let w = 7*24*60*60*1000;

  let a = history.filter(h=>h.date>now-w);
  let b = history.filter(h=>h.date>now-2*w && h.date<=now-w);

  let avg = arr => arr.length
    ? Math.round(arr.reduce((x,y)=>x+y.score,0)/arr.length)
    : 0;

  let avgA = avg(a);
  let avgB = avg(b);

  weeklyStats.innerText = `This week avg: ${avgA}%`;

  let diff = avgA - avgB;

  comparison.innerText =
    avgB===0 ? "No previous data"
    : diff>0 ? `Improved +${diff}%`
    : `Down ${diff}%`;
}

/* INIT */
loadJournal();
insightsEngine();
patternsEngine();
weeklyReport();

</script>

</body>
</html>
