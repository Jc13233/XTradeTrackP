<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 40px 20px;
  text-align: center;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 16px;
  margin-top: 20px;
}

button {
  padding: 10px 16px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  margin: 5px;
}

.good { background:#22c55e; }
.bad { background:#ef4444; }

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  margin-top: 20px;
}

.day {
  padding: 15px;
  border-radius: 10px;
  background: #111;
  cursor: pointer;
}

.green { background:#22c55e; }
.yellow { background:#eab308; }
.red { background:#ef4444; }
.gray { background:#444; }

.stats {
  display: flex;
  justify-content: space-around;
  margin-top: 20px;
}

.stat {
  background: rgba(0,0,0,0.4);
  padding: 15px;
  border-radius: 12px;
  width: 30%;
}
</style>
</head>

<body>

<div class="container">

<h1>TradeTrack</h1>

<!-- NAV -->
<div>
<button onclick="showPage('session')">Session</button>
<button onclick="showPage('calendar')">Calendar</button>
<button onclick="resetAll()">Reset Data</button>
</div>

<!-- SESSION -->
<div id="sessionPage" class="card">

<h3>Live Session</h3>

<div class="stats">
<div class="stat">Trades<br><span id="trades">0</span></div>
<div class="stat">Mistakes<br><span id="breaks">0</span></div>
<div class="stat">Score<br><span id="score">100</span>%</div>
</div>

<br>

<button class="good" onclick="followRule()">Executed Discipline</button>
<button class="bad" onclick="breakRule()">Broke Your System</button>

<br><br>

<button onclick="endSession()">End Session</button>

</div>

<!-- CALENDAR -->
<div id="calendarPage" class="card" style="display:none;">

<h3 id="monthTitle"></h3>

<button onclick="changeMonth(-1)">⬅</button>
<button onclick="changeMonth(1)">➡</button>

<div class="stats">
<div class="stat">Days<br><span id="days"></span></div>
<div class="stat">Avg Score<br><span id="avgScore"></span></div>
<div class="stat">Bad Days<br><span id="badDays"></span></div>
</div>

<div id="calendar" class="calendar"></div>

<div id="dayDetail" style="margin-top:20px;"></div>

</div>

</div>

<script>

/* RESET ALL DATA ON FIRST LOAD */
localStorage.removeItem("calendarData");

/* DATA */
let history = JSON.parse(localStorage.getItem("calendarData")) || {};
let currentDate = new Date();

/* SESSION STATE */
let trades=0, breaks=0, score=100;

/* NAV */
function showPage(page){
  document.getElementById("sessionPage").style.display =
    page==="session" ? "block" : "none";

  document.getElementById("calendarPage").style.display =
    page==="calendar" ? "block" : "none";

  if(page==="calendar") renderCalendar();
}

/* HELPERS */
function formatDate(date){
  return date.toISOString().split("T")[0];
}

/* SESSION ACTIONS */
function followRule(){
  trades++;
  updateSession();
}

function breakRule(){
  trades++;
  breaks++;
  score -= 25;
  updateSession();
}

function updateSession(){
  document.getElementById("trades").innerText = trades;
  document.getElementById("breaks").innerText = breaks;
  document.getElementById("score").innerText = score;
}

/* END SESSION */
function endSession(){

  let grade="D";
  if(score>=90) grade="A";
  else if(score>=75) grade="B";
  else if(score>=50) grade="C";

  let today = formatDate(new Date());

  history[today] = {
    score: score,
    trades: trades,
    breaks: breaks,
    grade: grade
  };

  localStorage.setItem("calendarData", JSON.stringify(history));

  alert("Session saved.");

  trades=0;
  breaks=0;
  score=100;
  updateSession();
}

/* RESET BUTTON */
function resetAll(){
  if(confirm("This will delete ALL data. Continue?")){
    localStorage.clear();
    location.reload();
  }
}

/* CALENDAR */
function changeMonth(offset){
  currentDate.setMonth(currentDate.getMonth()+offset);
  renderCalendar();
}

function renderCalendar(){

  let cal = document.getElementById("calendar");
  cal.innerHTML="";

  let year = currentDate.getFullYear();
  let month = currentDate.getMonth();

  let firstDay = new Date(year, month, 1);
  let lastDay = new Date(year, month+1, 0);

  document.getElementById("monthTitle").innerText =
    firstDay.toLocaleString('default',{month:'long',year:'numeric'});

  let total=0, totalScore=0, bad=0;

  for(let i=1;i<=lastDay.getDate();i++){

    let date = new Date(year,month,i);
    let key = formatDate(date);

    let div = document.createElement("div");
    div.classList.add("day");

    let data = history[key];

    if(data){
      total++;
      totalScore += data.score;

      if(data.score>=75) div.classList.add("green");
      else if(data.score>=50) div.classList.add("yellow");
      else {
        div.classList.add("red");
        bad++;
      }
    } else {
      div.classList.add("gray");
    }

    div.innerText=i;

    div.onclick=()=>{
      if(data){
        document.getElementById("dayDetail").innerHTML =
          `<b>Score:</b> ${data.score}%<br>
           <b>Trades:</b> ${data.trades}<br>
           <b>Mistakes:</b> ${data.breaks}<br>
           <b>Grade:</b> ${data.grade}`;
      } else {
        document.getElementById("dayDetail").innerText="No data";
      }
    };

    cal.appendChild(div);
  }

  document.getElementById("days").innerText=total;
  document.getElementById("badDays").innerText=bad;
  document.getElementById("avgScore").innerText =
    total ? Math.round(totalScore/total)+"%" : "0%";
}

/* INIT */
updateSession();

</script>

</body>
</html>
