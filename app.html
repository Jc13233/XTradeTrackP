<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack</title>

<style>
body {
  margin:0;
  font-family: Inter, system-ui;
  background:#020617;
  color:#e2e8f0;
}

/* NAV */
.nav {
  display:flex;
  justify-content:center;
  gap:20px;
  padding:20px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.nav button {
  background:none;
  color:#94a3b8;
  border:none;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}

.nav button.active {
  color:#a78bfa;
  transform:scale(1.05);
}

/* CONTAINER */
.container {
  max-width:700px;
  margin:auto;
  padding:20px;
}

/* CARD */
.card {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  padding:20px;
  margin-top:20px;
  transition:0.25s;
}

.card:hover {
  transform:translateY(-4px);
}

/* BUTTONS */
button {
  padding:10px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  transform:translateY(-2px);
}

button:active {
  transform:scale(0.96);
}

.primary { background:#7c3aed; color:white; }
.bad { background:#ef4444; color:white; }

/* PROGRESS */
.progress {
  height:8px;
  background:#020617;
  border-radius:10px;
  margin-top:10px;
}

.bar {
  height:100%;
  background:#7c3aed;
  transition:width 0.4s ease;
}

/* FADE */
.fade {
  animation:fade 0.3s ease;
}

@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

/* ENTRY */
.entry {
  padding:12px;
  margin-top:10px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}

.insight {
  padding:10px;
  margin-top:10px;
  border-left:3px solid #7c3aed;
  background:rgba(124,58,237,0.1);
  border-radius:8px;
}

.small { color:#94a3b8; font-size:13px; }

.hidden { display:none; }
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <button onclick="showTab('dash')" class="active" id="tabDash">Dashboard</button>
  <button onclick="showTab('journal')" id="tabJournal">Journal</button>
  <button onclick="showTab('insights')" id="tabInsights">Insights</button>
</div>

<div class="container">

<!-- DASH -->
<div id="dash" class="fade">

<div class="card">
<h2>Session</h2>
<p id="scoreWrap">Score: <span id="score">100</span>%</p>

<select id="reason">
<option value="">Why break?</option>
<option>FOMO</option>
<option>Revenge</option>
<option>Boredom</option>
<option>Impulse</option>
</select>

<button class="bad" onclick="bad()">Mistake</button>
<button onclick="endSession()">End Session</button>
</div>

<div class="card">
<h3>Stats</h3>
<p>🔥 Streak: <span id="streak">0</span></p>
<p>⭐ Level: <span id="level">1</span></p>
<div class="progress"><div id="xpBar" class="bar"></div></div>
</div>

<div class="card">
<button class="primary" onclick="startSession()">Start Session</button>

<a href="https://buy.stripe.com/aFa8wP0XEfQhfb81F16Na01" target="_blank">
<button class="primary">Upgrade</button>
</a>

<p id="usage"></p>
</div>

</div>

<!-- JOURNAL -->
<div id="journal" class="hidden">
<div class="card">
<h2>Journal</h2>

<button onclick="filter('all')">All</button>
<button onclick="filter('good')">Good</button>
<button onclick="filter('bad')">Bad</button>

<div id="journalList"></div>
</div>
</div>

<!-- INSIGHTS -->
<div id="insights" class="hidden">
<div class="card">
<h2>Insights</h2>
<div id="insightBox"></div>
</div>

<div class="card">
<h3>Weekly</h3>
<p id="weekly"></p>
</div>
</div>

</div>

<script>

/* TAB */
function showTab(tab){
  ["dash","journal","insights"].forEach(id=>{
    document.getElementById(id).classList.add("hidden");
    document.getElementById("tab"+id.charAt(0).toUpperCase()+id.slice(1)).classList.remove("active");
  });

  let el = document.getElementById(tab);
  el.classList.remove("hidden");
  el.classList.add("fade");

  document.getElementById("tab"+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add("active");
}

/* DATA */
let history = JSON.parse(localStorage.getItem("history")||"[]");
let streak = +localStorage.getItem("streak")||0;
let xp = +localStorage.getItem("xp")||0;
let level = +localStorage.getItem("level")||1;
let freeUsed = +localStorage.getItem("freeUsed")||0;

/* INIT */
streakEl.innerText = streak;
levelEl.innerText = level;
xpBar.style.width = (xp/(level*100))*100+"%";
usage.innerText = "Free left: "+(5-freeUsed);

/* SESSION */
let score = 100;
let reasons = [];

function animateScore(){
  let el = document.getElementById("scoreWrap");
  el.style.transform="scale(1.1)";
  setTimeout(()=>el.style.transform="scale(1)",150);
}

function startSession(){
  score = 100;
  reasons = [];
  scoreEl.innerText = score;
}

function bad(){
  let r = reason.value;
  if(!r) return alert("Pick reason");

  score -= 25;
  reasons.push(r);

  scoreEl.innerText = score;
  animateScore();

  if(score < 50){
    alert("Hard stop triggered");
    endSession();
  }
}

function endSession(){

  if(freeUsed>=5) return alert("Upgrade required");

  freeUsed++;
  localStorage.setItem("freeUsed", freeUsed);

  if(score>=75) streak++; else streak=0;
  localStorage.setItem("streak", streak);

  xp += score;
  if(xp >= level*100){
    xp -= level*100;
    level++;
  }

  localStorage.setItem("xp", xp);
  localStorage.setItem("level", level);

  history.push({score,reasons,date:Date.now()});
  localStorage.setItem("history", JSON.stringify(history));

  document.body.classList.add("fade");
  setTimeout(()=>location.reload(),300);
}

/* JOURNAL */
function loadJournal(type="all"){
  journalList.innerHTML="";

  history.slice().reverse().filter(h=>{
    if(type==="good") return h.score>=75;
    if(type==="bad") return h.score<75;
    return true;
  }).forEach(h=>{
    journalList.innerHTML+=`
      <div class="entry fade">
        ${new Date(h.date).toLocaleDateString()} — ${h.score}%<br>
        <span class="small">${h.reasons.join(", ")}</span>
      </div>`;
  });
}

function filter(t){ loadJournal(t); }
loadJournal();

/* INSIGHTS */
function insights(){
  if(history.length<3){
    insightBox.innerText="Not enough data";
    return;
  }

  let count={};
  history.forEach(h=>{
    h.reasons.forEach(r=>{
      count[r]=(count[r]||0)+1;
    });
  });

  let top = Object.keys(count).sort((a,b)=>count[b]-count[a])[0];

  insightBox.innerHTML = `<div class="insight fade">Main issue: ${top}</div>`;
}
insights();

/* WEEKLY */
function weekly(){
  let now=Date.now();
  let w=7*24*60*60*1000;

  let week = history.filter(h=>h.date>now-w);

  let avg = week.length
    ? Math.round(week.reduce((a,b)=>a+b.score,0)/week.length)
    : 0;

  document.getElementById("weekly").innerText =
    "This week avg: "+avg+"%";
}
weekly();

</script>

</body>
</html>
