<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

/* Layout */
.container {
  max-width: 700px;
  margin: auto;
  padding: 60px 20px;
  text-align: center;
}

/* Title */
h1 {
  font-size: 36px;
  margin-bottom: 10px;
}

p {
  color: #9ca3af;
}

/* Glass card */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  padding: 25px;
  margin-top: 25px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.08);
}

/* Inputs */
input {
  padding: 12px;
  margin: 10px;
  width: 120px;
  border-radius: 10px;
  border: none;
  background: #020617;
  color: white;
  text-align: center;
}

/* Buttons */
button {
  padding: 14px 22px;
  margin: 10px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-size: 15px;
  transition: 0.2s;
}

/* Button styles */
.start {
  background: linear-gradient(135deg,#4f7cff,#7c3aed);
  color: white;
  box-shadow: 0 0 20px #4f7cff55;
}

.good {
  background: #16a34a;
}

.bad {
  background: #dc2626;
}

button:hover {
  transform: scale(1.05);
}

/* Stats */
.stats {
  display: flex;
  justify-content: space-around;
  margin-top: 20px;
}

.stat {
  background: #020617;
  padding: 15px;
  border-radius: 12px;
  width: 30%;
}

/* Status */
.locked {
  color: #ef4444;
  font-size: 20px;
  margin-top: 20px;
  font-weight: bold;
}

/* Glow warning */
.warning {
  color: #f59e0b;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Discipline Session</h1>
<p>Rules are locked. Execution is everything.</p>

<!-- SETUP -->
<div class="card" id="setup">
<h3>Set Your Session Rules</h3>

<p>Max Trades</p>
<input id="maxTrades" type="number" value="3">

<p>Max Rule Breaks</p>
<input id="maxBreaks" type="number" value="2">

<br>
<button class="start" onclick="startSession()">Start Session</button>
</div>

<!-- SESSION -->
<div class="card" id="session" style="display:none;">

<div class="stats">
  <div class="stat">
    Trades<br><strong id="trades">0</strong>
  </div>
  <div class="stat">
    Breaks<br><strong id="breaks">0</strong>
  </div>
  <div class="stat">
    Limit<br><strong id="limit">0</strong>
  </div>
</div>

<button class="good" onclick="followRule()">Followed Rules</button>
<button class="bad" onclick="breakRule()">Broke Rules</button>

<div id="status"></div>

</div>

</div>

<script>
let trades = 0;
let breaks = 0;
let maxTrades = 0;
let maxBreaks = 0;
let locked = false;

function startSession() {
  maxTrades = parseInt(document.getElementById("maxTrades").value);
  maxBreaks = parseInt(document.getElementById("maxBreaks").value);

  trades = 0;
  breaks = 0;
  locked = false;

  document.getElementById("setup").style.display = "none";
  document.getElementById("session").style.display = "block";

  document.getElementById("limit").innerText = maxTrades;

  update();
}

function followRule() {
  if (locked) return;

  trades++;
  update();
  checkLimits();
}

function breakRule() {
  if (locked) return;

  trades++;
  breaks++;
  update();
  checkLimits();
}

function checkLimits() {
  if (breaks >= maxBreaks) {
    lockSession("Too many rule breaks");
  }

  if (trades >= maxTrades) {
    lockSession("Max trades reached");
  }
}

function lockSession(reason) {
  locked = true;

  document.getElementById("status").innerHTML =
    "<div class='locked'>SESSION LOCKED</div><div class='warning'>" + reason + "</div>";
}

function update() {
  document.getElementById("trades").innerText = trades;
  document.getElementById("breaks").innerText = breaks;
}
</script>

</body>
</html>
