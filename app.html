<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:white;
}

.container {
  max-width:700px;
  margin:auto;
  padding:40px 20px;
  text-align:center;
}

.card {
  background:rgba(255,255,255,0.05);
  padding:25px;
  margin-top:20px;
  border-radius:20px;
}

button {
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.start { background:#7c3aed; }
.good { background:#16a34a; }
.bad { background:#dc2626; }

.hidden { display:none; }

canvas {
  margin-top:15px;
  background:#020617;
  border-radius:10px;
}

.entry {
  text-align:left;
  margin-top:10px;
  padding:10px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}

.warning {
  margin-top:10px;
  font-weight:bold;
  color:#facc15;
}

.danger {
  color:#ef4444;
}

.upgrade { color:#a78bfa; }
</style>
</head>

<body>

<div class="container">

<h1>TradeTrack</h1>

<!-- SETUP -->
<div class="card" id="setup">

<h3>Checklist</h3>

<label><input type="checkbox" id="c1"> Setup</label><br>
<label><input type="checkbox" id="c2"> Risk</label><br>
<label><input type="checkbox" id="c3"> No revenge</label><br>
<label><input type="checkbox" id="c4"> Follow plan</label>

<br>
<button class="start" id="startBtn">Start Session</button>

<p id="usage"></p>
<p>🔥 Streak: <span id="streak">0</span></p>
<p>⭐ Level: <span id="level">1</span> | XP: <span id="xp">0</span></p>

<a href="https://buy.stripe.com/aFa8wP0XEfQhfb81F16Na01" target="_blank">
<button class="start">Upgrade to Pro — £15/month</button>
</a>

</div>

<!-- SESSION -->
<div class="card hidden" id="session">

<p>Score: <span id="score">100</span>%</p>

<div id="warning" class="warning"></div>

<button class="good" id="goodBtn">Good</button>

<select id="reason">
<option value="">Why break?</option>
<option>FOMO</option>
<option>Revenge</option>
<option>Boredom</option>
<option>Impulse</option>
</select>

<button class="bad" id="badBtn">Bad</button>

<br>
<button id="endBtn">End Session</button>

</div>

<!-- RESULT -->
<div class="card hidden" id="result">

<h2 id="resultTitle"></h2>
<h1 id="grade"></h1>

<textarea id="notes" placeholder="Session notes..."></textarea>

<br>
<button id="saveNoteBtn">Save</button>

</div>

<!-- CHART -->
<div class="card">

<h3>Performance Chart (Pro)</h3>

<canvas id="chart" width="300" height="150"></canvas>

<div id="chartLock" class="upgrade hidden">
Upgrade to Pro to view chart
</div>

</div>

<!-- JOURNAL -->
<div class="card">

<h3>Journal (Pro)</h3>

<div id="journalContent"></div>

<div id="journalLock" class="upgrade hidden">
Upgrade to Pro to view journal
</div>

</div>

</div>

<script>

/* PLAN */
let plan = localStorage.getItem("plan") || "free";
if(window.location.search.includes("pro=true")){
  plan="pro";
  localStorage.setItem("plan","pro");
}

/* DATA */
let freeUsed = +localStorage.getItem("freeUsed") || 0;
let streak = +localStorage.getItem("streak") || 0;
let history = JSON.parse(localStorage.getItem("history") || "[]");

let xp = +localStorage.getItem("xp") || 0;
let level = +localStorage.getItem("level") || 1;

/* ELEMENTS */
const startBtn = document.getElementById("startBtn");
const session = document.getElementById("session");
const setup = document.getElementById("setup");
const result = document.getElementById("result");

const scoreEl = document.getElementById("score");
const warningEl = document.getElementById("warning");

const notesInput = document.getElementById("notes");
const saveNoteBtn = document.getElementById("saveNoteBtn");

const chart = document.getElementById("chart");
const chartLock = document.getElementById("chartLock");

const journalContent = document.getElementById("journalContent");
const journalLock = document.getElementById("journalLock");

/* UI INIT */
document.getElementById("usage").innerText =
  plan==="free"
  ? "Free sessions left: " + (5-freeUsed)
  : "Unlimited";

document.getElementById("streak").innerText = streak;
document.getElementById("xp").innerText = xp;
document.getElementById("level").innerText = level;

/* SESSION */
let score = 100;
let reasons=[];
let sessionActive = true;

/* START */
startBtn.onclick = () => {

  if(plan==="free" && freeUsed>=5){
    alert("Limit reached");
    return;
  }

  if(!c1.checked||!c2.checked||!c3.checked||!c4.checked){
    alert("Complete checklist");
    return;
  }

  setup.classList.add("hidden");
  session.classList.remove("hidden");
};

/* GOOD */
goodBtn.onclick = () => {
  if(!sessionActive) return;
};

/* BAD */
badBtn.onclick = () => {

  if(!sessionActive) return;

  let r = reason.value;
  if(!r){
    alert("Pick reason");
    return;
  }

  score -= 25;
  reasons.push(r);

  updateUI();

  /* HARD STOP */
  if(score < 50){
    triggerHardStop();
  }
};

/* UPDATE UI */
function updateUI(){
  scoreEl.innerText = score;

  if(score < 75 && score >= 50){
    warningEl.innerText = "⚠️ You're slipping";
  }

  if(score < 50){
    warningEl.innerText = "🚨 Discipline breaking down";
    warningEl.classList.add("danger");
  }
}

/* HARD STOP */
function triggerHardStop(){

  sessionActive = false;

  alert("You’re no longer trading today.");

  endSession();
}

/* END SESSION */
endBtn.onclick = () => {
  if(!sessionActive) return;
  endSession();
};

function endSession(){

  if(plan==="free"){
    freeUsed++;
    localStorage.setItem("freeUsed", freeUsed);
  }

  if(score>=75){ streak++; } else { streak=0; }
  localStorage.setItem("streak", streak);

  let gainedXP = Math.max(10, score);
  xp += gainedXP;

  if(xp >= level*100){
    xp -= level*100;
    level++;
  }

  localStorage.setItem("xp", xp);
  localStorage.setItem("level", level);

  history.push({
    score:score,
    reasons:reasons,
    note:"",
    date:Date.now()
  });

  localStorage.setItem("history", JSON.stringify(history));

  session.classList.add("hidden");
  result.classList.remove("hidden");

  let grade = score>=90?"A":score>=75?"B":score>=50?"C":"D";

  document.getElementById("grade").innerText = grade;
  document.getElementById("resultTitle").innerText =
    score>=75 ? "Strong Discipline" : "Session Cut Short";
}

/* SAVE NOTE */
saveNoteBtn.onclick = () => {
  history[history.length-1].note = notesInput.value;
  localStorage.setItem("history", JSON.stringify(history));
  location.reload();
};

/* CHART */
function drawChart(){

  if(plan==="free"){
    chart.style.display="none";
    chartLock.classList.remove("hidden");
    return;
  }

  let ctx = chart.getContext("2d");
  let data = history.slice(-7).map(h=>h.score);

  ctx.clearRect(0,0,300,150);

  ctx.beginPath();
  data.forEach((val,i)=>{
    let x = i*40 + 10;
    let y = 150 - val;
    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });

  ctx.strokeStyle="#7c3aed";
  ctx.lineWidth=2;
  ctx.stroke();
}

drawChart();

/* JOURNAL */
function loadJournal(){

  if(plan==="free"){
    journalContent.style.display="none";
    journalLock.classList.remove("hidden");
    return;
  }

  journalContent.innerHTML="";

  history.slice().reverse().forEach(h=>{
    journalContent.innerHTML += `
      <div class="entry">
        <strong>${h.score}%</strong><br>
        ${(h.reasons||[]).join(", ")}<br>
        ${h.note || "-"}
      </div>
    `;
  });
}

loadJournal();

</script>

</body>
</html>
