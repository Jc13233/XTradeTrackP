<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

.container {
  max-width: 750px;
  margin: auto;
  padding: 50px 20px;
  text-align: center;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 30px;
  margin-top: 25px;
  border-radius: 20px;
  box-shadow: 0 0 40px rgba(79,124,255,0.1);
}

/* BUTTONS */
button {
  padding: 14px 22px;
  margin: 10px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 20px rgba(255,255,255,0.15);
}

.start {
  background: linear-gradient(135deg,#4f7cff,#7c3aed);
  color: white;
}

.good {
  background: linear-gradient(135deg,#22c55e,#16a34a);
}

.bad {
  background: linear-gradient(135deg,#ef4444,#dc2626);
}

/* CHECKLIST */
.checklist label {
  display: block;
  background: rgba(255,255,255,0.05);
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.checklist input {
  margin-right: 8px;
}

.checklist label:hover {
  background: rgba(255,255,255,0.1);
}

/* INPUTS */
input {
  padding: 10px;
  margin: 10px;
  width: 120px;
  border-radius: 10px;
  border: none;
  background: #020617;
  color: white;
  text-align: center;
}

/* STATS */
.stats {
  display: flex;
  justify-content: space-between;
}

.stat {
  background: rgba(0,0,0,0.4);
  padding: 15px;
  border-radius: 12px;
  width: 30%;
  font-size: 14px;
}

.locked {
  color: #ff4d4d;
  font-size: 20px;
  margin-top: 10px;
}

/* HISTORY */
.history {
  margin-top: 20px;
  text-align: left;
  font-size: 13px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">

<h1>TradeTrack</h1>
<p style="opacity:0.6;">Build discipline. Eliminate overtrading.</p>

<div class="card" id="setup">

<h3>Pre-Trade Checklist</h3>

<div class="checklist">
<label><input type="checkbox" id="c1"> Clear setup confirmed</label>
<label><input type="checkbox" id="c2"> Risk defined</label>
<label><input type="checkbox" id="c3"> No revenge trading</label>
<label><input type="checkbox" id="c4"> Following system rules</label>
</div>

<p>Max Trades</p>
<input id="maxTrades" type="number" value="3">

<p>Max Breaks</p>
<input id="maxBreaks" type="number" value="2">

<br>

<button class="start" onclick="startSession()">Start Session</button>

<p>🔥 Streak: <span id="streak">0</span></p>

<a href="https://buy.stripe.com/9B628r8q61Zr0geerN6Na00" target="_blank">
  <button class="start">Upgrade — £15/month</button>
</a>

<p style="opacity:0.6;font-size:14px;">
5 free sessions → then unlimited access
</p>

<button onclick="unlockPro()">I Paid – Unlock</button>

<p id="usageText"></p>

</div>

<div class="card" id="session" style="display:none;">

<div class="stats">
<div class="stat">Trades<br><span id="trades">0</span></div>
<div class="stat">Breaks<br><span id="breaks">0</span></div>
<div class="stat">Limit<br><span id="limit">0</span></div>
</div>

<br>

<button class="good" onclick="followRule()">Followed Plan</button>
<button class="bad" onclick="breakRule()">Broke Rule</button>

<div id="status"></div>
<div id="report"></div>

<div class="history">
<h3>History</h3>
<div id="history"></div>
</div>

</div>

</div>

<script>
let trades=0, breaks=0, maxTrades=0, maxBreaks=0;
let locked=false;

let plan = localStorage.getItem("plan") || "free";
let freeSessionsUsed = localStorage.getItem("freeSessionsUsed") || 0;
let streak = localStorage.getItem("streak") || 0;

document.getElementById("streak").innerText = streak;

function updateUsageUI(){
  let remaining = 5 - freeSessionsUsed;
  document.getElementById("usageText").innerText =
    plan === "free" ? "Free sessions left: " + remaining : "Unlimited access";
}

function isLockedToday(){
  let lockDate = localStorage.getItem("lockDate");
  let today = new Date().toDateString();
  return lockDate === today;
}

function startSession(){

  if(plan==="free" && freeSessionsUsed>=5){
    alert("Upgrade to continue.");
    return;
  }

  if(isLockedToday()){
    alert("Locked for today.");
    return;
  }

  if(!c1.checked||!c2.checked||!c3.checked||!c4.checked){
    alert("Complete checklist");
    return;
  }

  trades=0; breaks=0; locked=false;

  maxTrades = +maxTradesInput.value;
  maxBreaks = +maxBreaksInput.value;

  setup.style.display="none";
  session.style.display="block";

  limit.innerText = maxTrades;
}

function followRule(){
  if(locked) return;
  trades++;
  update();
  check();
}

function breakRule(){
  if(locked) return;
  trades++; breaks++;
  update();
  check();
}

function check(){
  if(breaks>=maxBreaks || trades>=maxTrades){
    lock();
  }
}

function lock(){
  locked=true;

  let score = Math.max(0,100-(breaks*25));

  status.innerHTML = "<div class='locked'>SESSION LOCKED</div>";
  report.innerHTML = "<p>Score: "+score+"%</p>";

  localStorage.setItem("lockDate", new Date().toDateString());

  if(plan==="free"){
    freeSessionsUsed++;
    localStorage.setItem("freeSessionsUsed", freeSessionsUsed);
  }

  if(score>=75){streak++;} else {streak=0;}
  localStorage.setItem("streak", streak);
  document.getElementById("streak").innerText = streak;

  saveSession(score);
  loadHistory();
  updateUsageUI();
}

function saveSession(score){
  let history = JSON.parse(localStorage.getItem("history")) || [];
  history.push({date:new Date().toLocaleString(),trades,breaks,score});
  localStorage.setItem("history", JSON.stringify(history));
}

function loadHistory(){
  let history = JSON.parse(localStorage.getItem("history")) || [];
  let html="";
  history.slice().reverse().forEach(s=>{
    html += "<p>"+s.date+" | "+s.score+"%</p>";
  });
  document.getElementById("history").innerHTML = html;
}

function unlockPro(){
  plan="pro";
  localStorage.setItem("plan","pro");
  alert("Pro unlocked");
  updateUsageUI();
}

function update(){
  tradesEl.innerText=trades;
  breaksEl.innerText=breaks;
}

const tradesEl=document.getElementById("trades");
const breaksEl=document.getElementById("breaks");
const maxTradesInput=document.getElementById("maxTrades");
const maxBreaksInput=document.getElementById("maxBreaks");
const setup=document.getElementById("setup");
const session=document.getElementById("session");
const limit=document.getElementById("limit");
const status=document.getElementById("status");
const report=document.getElementById("report");
const c1=document.getElementById("c1");
const c2=document.getElementById("c2");
const c3=document.getElementById("c3");
const c4=document.getElementById("c4");

loadHistory();
updateUsageUI();
</script>

</body>
</html>
