<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 60px 20px;
  text-align: center;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  padding: 25px;
  margin-top: 25px;
  border-radius: 16px;
}

input {
  padding: 10px;
  margin: 8px;
  width: 120px;
  border-radius: 10px;
  border: none;
  background: #020617;
  color: white;
}

button {
  padding: 12px 20px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.start { background: linear-gradient(135deg,#4f7cff,#7c3aed); }
.good { background: #16a34a; }
.bad { background: #dc2626; }

.stats {
  display: flex;
  justify-content: space-around;
}

.stat {
  background: #020617;
  padding: 15px;
  border-radius: 10px;
  width: 30%;
}

.locked {
  color: red;
  font-size: 20px;
}

.cooldown {
  color: orange;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Discipline Session</h1>

<!-- SETUP -->
<div class="card" id="setup">
<h3>Set Rules</h3>

<label><input type="checkbox" id="c1"> Clear setup</label><br>
<label><input type="checkbox" id="c2"> Risk defined</label><br>
<label><input type="checkbox" id="c3"> No revenge</label><br>
<label><input type="checkbox" id="c4"> Follow system</label><br>

<p>Max Trades</p>
<input id="maxTrades" type="number" value="3">

<p>Max Breaks</p>
<input id="maxBreaks" type="number" value="2">

<br>
<button class="start" onclick="startSession()">Start</button>

<p>🔥 Streak: <span id="streak">0</span></p>
</div>

<!-- SESSION -->
<div class="card" id="session" style="display:none;">

<div class="stats">
<div class="stat">Trades<br><span id="trades">0</span></div>
<div class="stat">Breaks<br><span id="breaks">0</span></div>
<div class="stat">Limit<br><span id="limit">0</span></div>
</div>

<button class="good" onclick="followRule()">Followed</button>
<button class="bad" onclick="breakRule()">Broke</button>

<div id="status"></div>
<div id="cooldown"></div>
<div id="report"></div>

</div>

</div>

<script>
let trades=0, breaks=0, maxTrades=0, maxBreaks=0;
let locked=false;
let cooldownMinutes = 60;
let streak = localStorage.getItem("streak") || 0;

document.getElementById("streak").innerText = streak;

function startSession(){
  if(!c1.checked||!c2.checked||!c3.checked||!c4.checked){
    alert("Complete checklist");
    return;
  }

  trades=0; breaks=0; locked=false;

  maxTrades = +maxTradesInput.value;
  maxBreaks = +maxBreaksInput.value;

  setup.style.display="none";
  session.style.display="block";

  limit.innerText = maxTrades;
}

function followRule(){
  if(locked) return;
  trades++;
  update();
  check();
}

function breakRule(){
  if(locked) return;
  trades++; breaks++;
  update();
  check();
}

function check(){
  if(breaks>=maxBreaks || trades>=maxTrades){
    lock();
  }
}

function lock(){
  locked=true;

  let score = Math.max(0,100-(breaks*25));

  status.innerHTML = "<div class='locked'>SESSION LOCKED</div>";

  report.innerHTML =
    "<p>Score: "+score+"%</p>";

  if(score >= 75){
    streak++;
  } else {
    streak=0;
  }

  localStorage.setItem("streak", streak);
  document.getElementById("streak").innerText = streak;

  startCooldown();
}

function startCooldown(){
  let endTime = Date.now() + cooldownMinutes * 60 * 1000;
  localStorage.setItem("cooldownEnd", endTime);
  runCooldown();
}

function runCooldown(){
  let interval = setInterval(()=>{
    let now = Date.now();
    let endTime = localStorage.getItem("cooldownEnd");

    if(!endTime){
      clearInterval(interval);
      return;
    }

    let remaining = Math.floor((endTime - now) / 1000);

    if(remaining <= 0){
      clearInterval(interval);
      cooldown.innerHTML = "";
      localStorage.removeItem("cooldownEnd");

      setup.style.display="block";
      session.style.display="none";
      return;
    }

    let mins = Math.floor(remaining / 60);
    let secs = remaining % 60;

    cooldown.innerHTML =
      "<div class='cooldown'>Cooldown: " + mins + "m " + secs + "s</div>";

  },1000);
}

function update(){
  tradesEl.innerText=trades;
  breaksEl.innerText=breaks;
}

/* Elements */
const tradesEl=document.getElementById("trades");
const breaksEl=document.getElementById("breaks");
const maxTradesInput=document.getElementById("maxTrades");
const maxBreaksInput=document.getElementById("maxBreaks");
const setup=document.getElementById("setup");
const session=document.getElementById("session");
const limit=document.getElementById("limit");
const status=document.getElementById("status");
const report=document.getElementById("report");
const cooldown=document.getElementById("cooldown");
const c1=document.getElementById("c1");
const c2=document.getElementById("c2");
const c3=document.getElementById("c3");
const c4=document.getElementById("c4");

/* Auto resume cooldown */
if(localStorage.getItem("cooldownEnd")){
  setup.style.display="none";
  session.style.display="block";
  runCooldown();
}
</script>

</body>
</html>
