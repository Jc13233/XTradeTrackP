<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack</title>

<style>
body {
  margin:0;
  font-family: Inter, system-ui;
  background: radial-gradient(circle at top,#1e293b,#020617);
  color:#e2e8f0;
}

.container {
  max-width:720px;
  margin:auto;
  padding:40px 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  padding:25px;
  margin-top:20px;
  border-radius:18px;
}

button {
  padding:12px 20px;
  margin:10px 5px;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

.start { background: linear-gradient(135deg,#7c3aed,#6366f1); }
.good { background:#22c55e; }
.bad { background:#ef4444; }

.progress {
  height:10px;
  background:#020617;
  border-radius:10px;
  margin-top:10px;
  overflow:hidden;
}

.bar {
  height:100%;
  background:#7c3aed;
}

.entry {
  margin-top:10px;
  padding:10px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}

.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<h1>TradeTrack</h1>

<!-- WEEKLY REPORT -->
<div class="card">
<h3>Weekly Performance</h3>
<p id="weeklyStats"></p>
<p id="weeklyInsight"></p>
<p id="comparison"></p>
</div>

<!-- SETUP -->
<div class="card" id="setup">
<button class="start" id="startBtn">Start Session</button>

<p>🔥 Streak: <span id="streak">0</span></p>
<p>⭐ Level: <span id="level">1</span></p>

<div class="progress"><div id="xpBar" class="bar"></div></div>
</div>

<!-- SESSION -->
<div class="card hidden" id="session">

<p>Score: <span id="score">100</span>%</p>

<button class="good" id="goodBtn">Good</button>

<select id="reason">
<option value="">Why break?</option>
<option>FOMO</option>
<option>Revenge</option>
<option>Boredom</option>
<option>Impulse</option>
</select>

<button class="bad" id="badBtn">Bad</button>
<button id="endBtn">End Session</button>

</div>

<!-- RESULT -->
<div class="card hidden" id="result">
<h1 id="grade"></h1>
</div>

<!-- JOURNAL -->
<div class="card">
<h3>Journal</h3>
<div id="journalContent"></div>
</div>

</div>

<script>

/* DATA */
let history = JSON.parse(localStorage.getItem("history") || "[]");
let streak = +localStorage.getItem("streak") || 0;
let xp = +localStorage.getItem("xp") || 0;
let level = +localStorage.getItem("level") || 1;

/* UI */
streakEl = document.getElementById("streak");
levelEl = document.getElementById("level");
xpBar = document.getElementById("xpBar");

streakEl.innerText = streak;
levelEl.innerText = level;
xpBar.style.width = (xp/(level*100))*100 + "%";

/* SESSION */
let score = 100;
let reasons = [];

/* START */
startBtn.onclick = () => {
  setup.classList.add("hidden");
  session.classList.remove("hidden");
};

/* BAD */
badBtn.onclick = () => {
  let r = reason.value;
  if(!r){ alert("Pick reason"); return; }

  score -= 25;
  reasons.push(r);

  if(score < 50){
    endSession();
  }
};

/* END */
endBtn.onclick = () => endSession();

function endSession(){

  if(score>=75){ streak++; } else { streak=0; }
  localStorage.setItem("streak", streak);

  xp += score;
  if(xp >= level*100){
    xp -= level*100;
    level++;
  }

  localStorage.setItem("xp", xp);
  localStorage.setItem("level", level);

  history.push({
    score:score,
    reasons:reasons,
    date:Date.now()
  });

  localStorage.setItem("history", JSON.stringify(history));

  session.classList.add("hidden");
  result.classList.remove("hidden");

  grade.innerText =
    score>=90?"A":
    score>=75?"B":
    score>=50?"C":"D";
}

/* JOURNAL */
function loadJournal(){
  history.slice().reverse().forEach(h=>{
    journalContent.innerHTML += `
      <div class="entry">
        ${new Date(h.date).toLocaleDateString()} — ${h.score}%
        <br>${(h.reasons||[]).join(", ")}
      </div>
    `;
  });
}
loadJournal();

/* WEEKLY COMPARISON */
function weeklyReport(){

  let now = Date.now();
  let oneWeek = 7*24*60*60*1000;

  let thisWeek = history.filter(h => h.date > now - oneWeek);
  let lastWeek = history.filter(h =>
    h.date > now - (2*oneWeek) && h.date <= now - oneWeek
  );

  function avg(arr){
    if(arr.length===0) return 0;
    return Math.round(arr.reduce((a,b)=>a+b.score,0)/arr.length);
  }

  let avgThis = avg(thisWeek);
  let avgLast = avg(lastWeek);

  weeklyStats.innerText =
    `This week: ${thisWeek.length} sessions | Avg ${avgThis}%`;

  let diff = avgThis - avgLast;

  if(lastWeek.length === 0){
    comparison.innerText = "No previous data yet";
  } else if(diff > 0){
    comparison.innerText = `📈 Improved by +${diff}% from last week`;
  } else if(diff < 0){
    comparison.innerText = `📉 Down ${diff}% — tighten discipline`;
  } else {
    comparison.innerText = "No change";
  }

  /* INSIGHT */
  if(avgThis < 60){
    weeklyInsight.innerText = "You are trading emotionally.";
  } else if(avgThis < 75){
    weeklyInsight.innerText = "You're inconsistent.";
  } else {
    weeklyInsight.innerText = "Strong discipline. Keep it up.";
  }
}

weeklyReport();

</script>

</body>
</html>
