<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 40px 20px;
  text-align: center;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 16px;
  margin-top: 20px;
}

/* BUTTONS */
button {
  padding: 12px 20px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  margin: 6px;
  font-weight: bold;
  color: white;
}

.primary { background: linear-gradient(135deg,#4f7cff,#7c3aed); }
.success { background: linear-gradient(135deg,#22c55e,#16a34a); }
.danger { background: linear-gradient(135deg,#ef4444,#dc2626); }

button:hover { transform: translateY(-2px); }

/* STATS */
.stats {
  display: flex;
  justify-content: space-around;
  margin-top: 20px;
}

.stat {
  background: rgba(0,0,0,0.4);
  padding: 15px;
  border-radius: 12px;
  width: 30%;
}

/* STREAK */
.streak {
  font-size: 20px;
  margin-top: 10px;
  color: gold;
}

/* TEXTAREA */
textarea {
  width: 100%;
  border-radius: 10px;
  border: none;
  padding: 10px;
  background: #111;
  color: white;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>TradeTrack</h1>
<div class="streak">🔥 Streak: <span id="streak">0</span></div>

<div class="card">

<h3>Live Session</h3>

<div class="stats">
<div class="stat">Trades<br><span id="trades">0</span></div>
<div class="stat">Mistakes<br><span id="breaks">0</span></div>
<div class="stat">Score<br><span id="score">100</span>%</div>
</div>

<br>

<button class="success" onclick="followRule()">Executed Discipline</button>
<button class="danger" onclick="breakRule()">Broke Rule</button>

<textarea id="journalInput" placeholder="Journal your thoughts..."></textarea>

<br>

<button class="primary" onclick="endSession()">End Session</button>

</div>

</div>

<script>

/* STORAGE */
let history = JSON.parse(localStorage.getItem("calendarData")) || {};
let streak = parseInt(localStorage.getItem("streak")) || 0;

/* SESSION STATE */
let trades=0, breaks=0, score=100;
let sessionActive = true;

/* UPDATE UI */
function updateUI(){
  document.getElementById("trades").innerText = trades;
  document.getElementById("breaks").innerText = breaks;
  document.getElementById("score").innerText = score;
  document.getElementById("streak").innerText = streak;
}

updateUI();

/* RULE ACTIONS */
function followRule(){
  if(!sessionActive) return;

  trades++;

  checkLimit();
  updateUI();
}

function breakRule(){
  if(!sessionActive) return;

  trades++;
  breaks++;
  score -= 25;

  checkLimit();
  updateUI();
}

/* LOCK SYSTEM */
function checkLimit(){
  if(trades >= 2){
    alert("Max trades reached. Session locked.");
    endSession();
    sessionActive = false;
  }
}

/* END SESSION */
function endSession(){

  let today = new Date().toISOString().split("T")[0];

  let grade="D";
  if(score>=90) grade="A";
  else if(score>=75) grade="B";
  else if(score>=50) grade="C";

  let journalText = document.getElementById("journalInput").value;

  history[today] = {
    score,
    trades,
    breaks,
    grade,
    journal: journalText
  };

  localStorage.setItem("calendarData", JSON.stringify(history));

  /* STREAK LOGIC */
  if(score >= 75){
    streak++;
  } else {
    streak = 0;
  }

  localStorage.setItem("streak", streak);

  alert("Session saved.");

  /* RESET SESSION */
  trades=0;
  breaks=0;
  score=100;
  sessionActive = true;

  document.getElementById("journalInput").value="";

  updateUI();
}

</script>

</body>
</html>
