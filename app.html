<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

.container {
  max-width: 750px;
  margin: auto;
  padding: 50px 20px;
  text-align: center;
}

.card {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 30px;
  margin-top: 25px;
  border-radius: 20px;
}

button {
  padding: 14px 22px;
  margin: 10px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-2px);
}

.start { background: linear-gradient(135deg,#4f7cff,#7c3aed); }
.good { background: linear-gradient(135deg,#22c55e,#16a34a); }
.bad { background: linear-gradient(135deg,#ef4444,#dc2626); }

.checklist label {
  display: block;
  background: rgba(255,255,255,0.05);
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
}

.stats {
  display: flex;
  justify-content: space-between;
}

.stat {
  background: rgba(0,0,0,0.4);
  padding: 15px;
  border-radius: 12px;
  width: 30%;
}

.progress-bar {
  height: 10px;
  background: #111;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 10px;
}

.progress-fill {
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg,#22c55e,#4f7cff);
  transition: width 0.3s ease;
}

.glow { box-shadow: 0 0 20px #22c55e; }
.fail { box-shadow: 0 0 20px #ef4444; }

.grade {
  font-size: 42px;
  font-weight: bold;
  margin-top: 10px;
}

.hidden { display:none; }

.plan-box {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.8;
}

#streak {
  text-shadow: 0 0 12px rgba(34,197,94,0.9);
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h1>TradeTrack</h1>
<p style="opacity:0.6;">Discipline = Consistency</p>

<!-- SETUP -->
<div class="card" id="setup">

<h3>Pre-Trade Checklist</h3>

<div class="checklist">
<label><input type="checkbox" id="c1"> Clear setup</label>
<label><input type="checkbox" id="c2"> Risk defined</label>
<label><input type="checkbox" id="c3"> No revenge</label>
<label><input type="checkbox" id="c4"> Follow system</label>
</div>

<button class="start" onclick="startSession()">Start Session</button>

<p>🔥 Discipline Streak: <span id="streak">0</span></p>

<div class="plan-box" id="planText">
Plan: Free Trial
</div>

<a href="https://buy.stripe.com/aFa8wP0XEfQhfb81F16Na01" target="_blank">
<button class="start">Upgrade to Pro — £15/month</button>
</a>

<p id="usageText"></p>

</div>

<!-- SESSION -->
<div class="card hidden" id="session">

<div class="stats">
<div class="stat">Trades<br><span id="trades">0</span></div>
<div class="stat">Mistakes<br><span id="breaks">0</span></div>
<div class="stat">Discipline<br><span id="score">100</span>%</div>
</div>

<div class="progress-bar">
<div id="bar" class="progress-fill"></div>
</div>

<br>

<button class="good" onclick="followRule()">Executed Discipline</button>
<button class="bad" onclick="breakRule()">Broke Your System</button>

<br>
<button onclick="endSession()">End Session</button>

</div>

<!-- RESULT -->
<div class="card hidden" id="result">

<h2>Session Complete</h2>

<div class="grade" id="grade"></div>

<p id="resultText"></p>

<p>🔥 Current Streak: <span id="finalStreak"></span></p>

<button class="start" onclick="location.reload()">New Session</button>

</div>

</div>

<script>
let plan = localStorage.getItem("plan") || "free";

/* AUTO UNLOCK */
if(window.location.search.includes("pro=true")){
  plan = "pro";
  localStorage.setItem("plan","pro");
}

/* PLAN TEXT */
document.getElementById("planText").innerText =
  plan === "pro" ? "Plan: Pro (£15/month)" : "Plan: Free Trial";

/* DATA */
let freeSessionsUsed = localStorage.getItem("freeSessionsUsed") || 0;
let streak = localStorage.getItem("streak") || 0;

document.getElementById("streak").innerText = streak;

let trades=0, breaks=0, score=100;

/* USAGE */
function updateUsageUI(){
  document.getElementById("usageText").innerText =
    plan==="free"
      ? "Free sessions left: "+(5-freeSessionsUsed)
      : "Unlimited access unlocked";
}

/* START */
function startSession(){

  if(plan==="free" && freeSessionsUsed>=5){
    alert("Upgrade to Pro (£15/month) to continue.");
    return;
  }

  if(!c1.checked||!c2.checked||!c3.checked||!c4.checked){
    alert("Complete checklist");
    return;
  }

  document.getElementById("setup").classList.add("hidden");
  document.getElementById("session").classList.remove("hidden");
}

/* ACTIONS */
function followRule(){
  trades++;
  updateScore();
}

function breakRule(){
  trades++;
  breaks++;
  score -= 25;
  updateScore();
}

/* SCORE */
function updateScore(){
  document.getElementById("trades").innerText = trades;
  document.getElementById("breaks").innerText = breaks;
  document.getElementById("score").innerText = score;

  let bar = document.getElementById("bar");
  bar.style.width = score+"%";

  bar.classList.toggle("glow", score >= 75);
  bar.classList.toggle("fail", score <= 50);
}

/* END */
function endSession(){

  alert("Session complete. You're done for today.");

  if(plan==="free"){
    freeSessionsUsed++;
    localStorage.setItem("freeSessionsUsed", freeSessionsUsed);
  }

  let grade = "D";
  let text = "You broke discipline. This is exactly what holds traders back.";

  if(score >= 90){
    grade="A";
    text="Elite execution. This is professional-level discipline.";
  }
  else if(score >= 75){
    grade="B";
    text="Good control. You're building consistency.";
  }
  else if(score >= 50){
    grade="C";
    text="You slipped. Tighten your rules next session.";
  }

  if(score >= 75){ streak++; } else { streak=0; }

  localStorage.setItem("streak", streak);

  document.getElementById("session").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  document.getElementById("grade").innerText = grade;
  document.getElementById("resultText").innerText = text;
  document.getElementById("finalStreak").innerText = streak;
}

updateUsageUI();
</script>

</body>
</html>
