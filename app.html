<div id="activeState" class="hidden">

  <p class="small">Session Active</p>

  <h2 id="timer">00:00</h2>

  <p>Score: <span id="score">100</span>%</p>

  <button onclick="endSession()">End Session</button>

  <br><br>

  <!-- Secondary (not dominant) -->
  <select id="reason">
    <option value="">Log mistake (optional)</option>
    <option>FOMO</option>
    <option>Revenge</option>
    <option>Boredom</option>
    <option>Impulse</option>
  </select>

  <button class="bad" onclick="bad()">Log</button>

</div>
