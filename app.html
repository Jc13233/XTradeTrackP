<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 60px 20px;
  text-align: center;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  padding: 25px;
  margin-top: 25px;
  border-radius: 16px;
}

input {
  padding: 10px;
  margin: 8px;
  width: 120px;
  border-radius: 10px;
  border: none;
  background: #020617;
  color: white;
}

button {
  padding: 12px 20px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.start { background: linear-gradient(135deg,#4f7cff,#7c3aed); }
.good { background: #16a34a; }
.bad { background: #dc2626; }

.stats {
  display: flex;
  justify-content: space-around;
}

.stat {
  background: #020617;
  padding: 15px;
  border-radius: 10px;
  width: 30%;
}

.locked {
  color: red;
  font-size: 20px;
}

.history {
  margin-top: 20px;
  text-align: left;
}
</style>
</head>

<body>

<div class="container">

<h1>Discipline Session</h1>

<!-- SETUP -->
<div class="card" id="setup">
<h3>Set Rules</h3>

<label><input type="checkbox" id="c1"> Clear setup</label><br>
<label><input type="checkbox" id="c2"> Risk defined</label><br>
<label><input type="checkbox" id="c3"> No revenge</label><br>
<label><input type="checkbox" id="c4"> Follow system</label><br>

<p>Max Trades</p>
<input id="maxTrades" type="number" value="3">

<p>Max Breaks</p>
<input id="maxBreaks" type="number" value="2">

<br>
<button class="start" onclick="startSession()">Start</button>

<p>🔥 Streak: <span id="streak">0</span></p>

<!-- STRIPE BUTTON -->
<a href="https://buy.stripe.com/9B628r8q61Zr0geerN6Na00" target="_blank">
  <button class="start">Upgrade to Pro</button>
</a>

<p style="opacity:0.7; font-size:14px;">
Unlock unlimited sessions, full history, and streak tracking.
</p>

<button onclick="unlockPro()">I Paid – Unlock</button>

<p id="planText">Current Plan: Free</p>
<p id="usageText"></p>
</div>

<!-- SESSION -->
<div class="card" id="session" style="display:none;">

<div class="stats">
<div class="stat">Trades<br><span id="trades">0</span></div>
<div class="stat">Breaks<br><span id="breaks">0</span></div>
<div class="stat">Limit<br><span id="limit">0</span></div>
</div>

<button class="good" onclick="followRule()">Followed</button>
<button class="bad" onclick="breakRule()">Broke</button>

<div id="status"></div>
<div id="report"></div>

<div class="history">
<h3>Session History</h3>
<div id="history"></div>
<p id="upgradeMsg"></p>
</div>

</div>

</div>

<script>
let trades=0, breaks=0, maxTrades=0, maxBreaks=0;
let locked=false;

/* PLAN + USAGE */
let plan = localStorage.getItem("plan") || "free";
let freeSessionsUsed = localStorage.getItem("freeSessionsUsed") || 0;

/* STREAK */
let streak = localStorage.getItem("streak") || 0;

/* INIT UI */
document.getElementById("planText").innerText =
  "Current Plan: " + (plan === "pro" ? "Pro" : "Free");

if(plan === "pro"){
  document.getElementById("streak").innerText = streak;
} else {
  document.getElementById("streak").innerText = "🔒";
}

/* USAGE UI */
function updateUsageUI(){
  if(plan === "free"){
    let remaining = 5 - freeSessionsUsed;
    document.getElementById("usageText").innerText =
      "Free sessions left: " + remaining;
  } else {
    document.getElementById("usageText").innerText = "";
  }
}

/* DAILY LOCK */
function isLockedToday(){
  let lockDate = localStorage.getItem("lockDate");
  let today = new Date().toDateString();
  return lockDate === today;
}

function startSession(){

  if(plan === "free" && freeSessionsUsed >= 5){
    alert("You've reached your free limit.\n\nUpgrade to TradeTrack Pro to continue building discipline.");
    return;
  }

  if(isLockedToday()){
    alert("You are locked for today.");
    return;
  }

  if(!c1.checked||!c2.checked||!c3.checked||!c4.checked){
    alert("Complete checklist");
    return;
  }

  trades=0; breaks=0; locked=false;

  maxTrades = +maxTradesInput.value;
  maxBreaks = +maxBreaksInput.value;

  setup.style.display="none";
  session.style.display="block";

  limit.innerText = maxTrades;
}

function followRule(){
  if(locked) return;
  trades++;
  update();
  check();
}

function breakRule(){
  if(locked) return;
  trades++; breaks++;
  update();
  check();
}

function check(){
  if(breaks>=maxBreaks || trades>=maxTrades){
    lock();
  }
}

function lock(){
  locked=true;

  let score = Math.max(0,100-(breaks*25));

  status.innerHTML = "<div class='locked'>SESSION LOCKED — DONE FOR TODAY</div>";
  report.innerHTML = "<p>Score: "+score+"%</p>";

  localStorage.setItem("lockDate", new Date().toDateString());

  if(plan === "free"){
    freeSessionsUsed++;
    localStorage.setItem("freeSessionsUsed", freeSessionsUsed);
  }

  if(score >= 75){
    streak++;
  } else {
    streak=0;
  }

  localStorage.setItem("streak", streak);

  if(plan === "pro"){
    document.getElementById("streak").innerText = streak;
  }

  saveSession(score);
  loadHistory();
  updateUsageUI();
}

/* SAVE SESSION */
function saveSession(score){
  let history = JSON.parse(localStorage.getItem("history")) || [];

  history.push({
    date: new Date().toLocaleString(),
    trades,
    breaks,
    score
  });

  localStorage.setItem("history", JSON.stringify(history));
}

/* LOAD HISTORY */
function loadHistory(){
  let history = JSON.parse(localStorage.getItem("history")) || [];

  if(plan === "free"){
    history = history.slice(-3);
  }

  let html = "";

  history.slice().reverse().forEach(s=>{
    html += "<p>"+s.date+" | Trades: "+s.trades+" | Breaks: "+s.breaks+" | Score: "+s.score+"%</p>";
  });

  document.getElementById("history").innerHTML = html;

  if(plan === "free"){
    document.getElementById("upgradeMsg").innerText =
      "Upgrade to Pro to unlock full history & streak tracking.";
  }
}

/* UNLOCK AFTER PAYMENT */
function unlockPro(){
  plan = "pro";
  localStorage.setItem("plan","pro");

  document.getElementById("planText").innerText = "Current Plan: Pro";
  document.getElementById("streak").innerText = streak;

  loadHistory();
  updateUsageUI();

  alert("Pro unlocked. You're good.");
}

function update(){
  tradesEl.innerText=trades;
  breaksEl.innerText=breaks;
}

/* Elements */
const tradesEl=document.getElementById("trades");
const breaksEl=document.getElementById("breaks");
const maxTradesInput=document.getElementById("maxTrades");
const maxBreaksInput=document.getElementById("maxBreaks");
const setup=document.getElementById("setup");
const session=document.getElementById("session");
const limit=document.getElementById("limit");
const status=document.getElementById("status");
const report=document.getElementById("report");
const c1=document.getElementById("c1");
const c2=document.getElementById("c2");
const c3=document.getElementById("c3");
const c4=document.getElementById("c4");

/* INIT */
loadHistory();
updateUsageUI();

if(isLockedToday()){
  status.innerHTML = "<div class='locked'>You are locked for today.</div>";
}
</script>

</body>
</html>
