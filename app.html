<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:white;
}

.container {
  max-width:800px;
  margin:auto;
  padding:40px 20px;
  text-align:center;
}

.card {
  background:rgba(255,255,255,0.05);
  padding:25px;
  margin-top:20px;
  border-radius:20px;
}

button {
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.start { background:#7c3aed; }
.good { background:#16a34a; }
.bad { background:#dc2626; }

.hidden { display:none; }

.progress {
  height:10px;
  background:#111;
  border-radius:10px;
  margin-top:10px;
}

.bar {
  height:100%;
  width:100%;
  background:#22c55e;
}

.heatmap div {
  margin:5px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>TradeTrack</h1>

<div class="card" id="setup">

<h3>Checklist</h3>

<label><input type="checkbox" id="c1"> Setup</label><br>
<label><input type="checkbox" id="c2"> Risk</label><br>
<label><input type="checkbox" id="c3"> No revenge</label><br>
<label><input type="checkbox" id="c4"> Follow plan</label>

<br>
<button class="start" id="startBtn">Start Session</button>

<p id="lockMsg"></p>

<p>Streak: <span id="streak">0</span></p>
<p id="usage"></p>

</div>

<div class="card hidden" id="session">

<p>Trades: <span id="trades">0</span></p>
<p>Mistakes: <span id="breaks">0</span></p>
<p>Score: <span id="score">100</span>%</p>

<div class="progress"><div id="bar" class="bar"></div></div>

<button class="good" id="goodBtn">Good</button>

<br>

<select id="reason">
<option value="">Why break?</option>
<option>FOMO</option>
<option>Revenge</option>
<option>Boredom</option>
<option>Impulse</option>
</select>

<button class="bad" id="badBtn">Bad</button>

<br>
<button id="endBtn">End</button>

</div>

<div class="card">

<h3>Heatmap (Pro)</h3>

<div id="heatmap"></div>

</div>

</div>

<script>
const startBtn = document.getElementById("startBtn");
const goodBtn = document.getElementById("goodBtn");
const badBtn = document.getElementById("badBtn");
const endBtn = document.getElementById("endBtn");

const setup = document.getElementById("setup");
const session = document.getElementById("session");

const tradesEl = document.getElementById("trades");
const breaksEl = document.getElementById("breaks");
const scoreEl = document.getElementById("score");
const bar = document.getElementById("bar");

const streakEl = document.getElementById("streak");
const usage = document.getElementById("usage");
const heatmap = document.getElementById("heatmap");

let freeUsed = +localStorage.getItem("freeUsed") || 0;
let streak = +localStorage.getItem("streak") || 0;
let history = JSON.parse(localStorage.getItem("history") || "[]");

streakEl.innerText = streak;
usage.innerText = "Free sessions left: " + (5-freeUsed);

let trades=0, breaks=0, score=100;
let reasons=[];

startBtn.onclick = () => {

  if(freeUsed>=5){
    alert("Limit reached");
    return;
  }

  if(!c1.checked||!c2.checked||!c3.checked||!c4.checked){
    alert("Complete checklist");
    return;
  }

  setup.classList.add("hidden");
  session.classList.remove("hidden");
};

goodBtn.onclick = () => {
  trades++;
  update();
};

badBtn.onclick = () => {
  let r = reason.value;
  if(!r){
    alert("Pick reason");
    return;
  }

  trades++;
  breaks++;
  score -= 25;
  reasons.push(r);
  update();
};

function update(){
  tradesEl.innerText = trades;
  breaksEl.innerText = breaks;
  scoreEl.innerText = score;
  bar.style.width = score+"%";
}

endBtn.onclick = () => {

  freeUsed++;
  localStorage.setItem("freeUsed", freeUsed);

  history.push({
    score:score,
    reasons:reasons
  });

  localStorage.setItem("history", JSON.stringify(history));

  alert("Session saved");
  location.reload();
};

function loadHeatmap(){

  let counts = {FOMO:0,Revenge:0,Boredom:0,Impulse:0};

  history.forEach(h=>{
    (h.reasons||[]).forEach(r=>{
      counts[r]++;
    });
  });

  heatmap.innerHTML = `
  <div>🔴 FOMO: ${counts.FOMO}</div>
  <div>🟠 Revenge: ${counts.Revenge}</div>
  <div>🟡 Boredom: ${counts.Boredom}</div>
  <div>🔵 Impulse: ${counts.Impulse}</div>
  `;
}

loadHeatmap();
</script>

</body>
</html>
