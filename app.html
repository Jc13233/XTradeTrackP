<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack</title>

<style>
body {
  margin:0;
  font-family: Inter, system-ui;
  background: radial-gradient(circle at top,#1e293b,#020617);
  color:#e2e8f0;
}

.container {
  max-width:720px;
  margin:auto;
  padding:40px 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border:1px solid rgba(255,255,255,0.08);
  padding:25px;
  margin-top:20px;
  border-radius:18px;
}

h1 { text-align:center; }

button {
  padding:12px 20px;
  margin:10px 5px;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

.start { background: linear-gradient(135deg,#7c3aed,#6366f1); }
.good { background:#22c55e; }
.bad { background:#ef4444; }

select, textarea {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  background:#020617;
  color:white;
}

.warning { color:#facc15; margin-top:10px; }
.danger { color:#ef4444; }

.success { color:#22c55e; }
.fail { color:#ef4444; }

.badge {
  display:inline-block;
  padding:10px;
  margin:6px;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
}

.locked { opacity:0.3; }

.upgrade { text-align:center; color:#a78bfa; }

canvas {
  margin-top:10px;
  background:#020617;
  border-radius:10px;
}

.entry {
  text-align:left;
  margin-top:10px;
  padding:10px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}

.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<h1>TradeTrack</h1>

<!-- SETUP -->
<div class="card" id="setup">

<h3>Checklist</h3>
<label><input type="checkbox" id="c1"> Setup</label><br>
<label><input type="checkbox" id="c2"> Risk</label><br>
<label><input type="checkbox" id="c3"> No revenge</label><br>
<label><input type="checkbox" id="c4"> Follow plan</label>

<h3>Session Goal</h3>
<select id="goal">
<option value="">Select goal</option>
<option value="1">Max 1 mistake</option>
<option value="2">Max 2 mistakes</option>
<option value="80">Stay above 80%</option>
</select>

<button class="start" id="startBtn">Start Session</button>

<p id="usage"></p>
<p>🔥 Streak: <span id="streak">0</span></p>
<p>⭐ Level: <span id="level">1</span> | XP: <span id="xp">0</span></p>

<a href="https://buy.stripe.com/aFa8wP0XEfQhfb81F16Na01" target="_blank">
<button class="start">Upgrade to Pro — £15/month</button>
</a>

</div>

<!-- SESSION -->
<div class="card hidden" id="session">

<p>Score: <span id="score">100</span>%</p>
<div id="warning" class="warning"></div>

<button class="good" id="goodBtn">Good</button>

<select id="reason">
<option value="">Why break?</option>
<option>FOMO</option>
<option>Revenge</option>
<option>Boredom</option>
<option>Impulse</option>
</select>

<button class="bad" id="badBtn">Bad</button>

<button id="endBtn">End Session</button>

</div>

<!-- RESULT -->
<div class="card hidden" id="result">

<h2 id="resultTitle"></h2>
<h1 id="grade"></h1>

<p id="goalResult"></p>
<p id="badgeEarned"></p>

<textarea id="notes" placeholder="Session notes..."></textarea>
<button id="saveNoteBtn">Save</button>

</div>

<!-- CHART -->
<div class="card">
<h3>Performance Chart</h3>
<canvas id="chart" width="300" height="150"></canvas>
<div id="chartLock" class="upgrade hidden">Upgrade to Pro to view chart</div>
</div>

<!-- JOURNAL -->
<div class="card">
<h3>Journal</h3>
<div id="journalContent"></div>
<div id="journalLock" class="upgrade hidden">Upgrade to Pro to view journal</div>
</div>

<!-- BADGES -->
<div class="card">
<h3>Achievements</h3>
<div id="badges"></div>
<div id="badgeLock" class="upgrade hidden">Upgrade to Pro to unlock achievements</div>
</div>

</div>

<script>

/* PRO SYSTEM */
let plan = localStorage.getItem("plan") || "free";

if (window.location.search.includes("pro=true")) {
  plan = "pro";
  localStorage.setItem("plan","pro");
  window.history.replaceState({}, document.title, window.location.pathname);
}

/* DATA */
let freeUsed = +localStorage.getItem("freeUsed") || 0;
let streak = +localStorage.getItem("streak") || 0;
let history = JSON.parse(localStorage.getItem("history") || "[]");

let xp = +localStorage.getItem("xp") || 0;
let level = +localStorage.getItem("level") || 1;

/* ELEMENTS */
const startBtn = document.getElementById("startBtn");
const session = document.getElementById("session");
const setup = document.getElementById("setup");
const result = document.getElementById("result");

const scoreEl = document.getElementById("score");
const warningEl = document.getElementById("warning");

const goalSelect = document.getElementById("goal");
const goalResult = document.getElementById("goalResult");
const badgeEarned = document.getElementById("badgeEarned");

const badgesDiv = document.getElementById("badges");
const badgeLock = document.getElementById("badgeLock");

const chart = document.getElementById("chart");
const chartLock = document.getElementById("chartLock");

const journalContent = document.getElementById("journalContent");
const journalLock = document.getElementById("journalLock");

/* INIT */
document.getElementById("usage").innerText =
  plan==="free"
  ? "Free sessions left: " + (5-freeUsed)
  : "Pro unlocked — Unlimited";

document.getElementById("streak").innerText = streak;
document.getElementById("xp").innerText = xp;
document.getElementById("level").innerText = level;

/* SESSION */
let score = 100;
let reasons = [];
let sessionActive = true;
let goal = null;

/* START */
startBtn.onclick = () => {

  if(plan==="free" && freeUsed>=5){
    alert("Free limit reached. Upgrade to continue.");
    return;
  }

  if(!goalSelect.value){
    alert("Select a goal");
    return;
  }

  if(!c1.checked||!c2.checked||!c3.checked||!c4.checked){
    alert("Complete checklist");
    return;
  }

  goal = goalSelect.value;

  setup.classList.add("hidden");
  session.classList.remove("hidden");
};

/* ACTIONS */
goodBtn.onclick = () => {};

badBtn.onclick = () => {

  if(!sessionActive) return;

  let r = reason.value;
  if(!r){ alert("Pick reason"); return; }

  score -= 25;
  reasons.push(r);

  updateUI();

  if(score < 50){
    triggerHardStop();
  }
};

/* UPDATE */
function updateUI(){
  scoreEl.innerText = score;

  if(score < 75 && score >= 50){
    warningEl.innerText = "⚠️ You're slipping";
  }

  if(score < 50){
    warningEl.innerText = "🚨 Discipline breaking down";
    warningEl.classList.add("danger");
  }
}

/* HARD STOP */
function triggerHardStop(){
  sessionActive = false;
  alert("You’re no longer trading today.");
  endSession();
}

/* END */
endBtn.onclick = () => {
  if(!sessionActive) return;
  endSession();
};

function endSession(){

  if(plan==="free"){
    freeUsed++;
    localStorage.setItem("freeUsed", freeUsed);
  }

  if(score>=75){ streak++; } else { streak=0; }
  localStorage.setItem("streak", streak);

  let gainedXP = Math.max(10, score);
  xp += gainedXP;

  if(xp >= level*100){
    xp -= level*100;
    level++;
  }

  localStorage.setItem("xp", xp);
  localStorage.setItem("level", level);

  history.push({
    score:score,
    reasons:reasons,
    note:"",
    goal:goal,
    date:Date.now()
  });

  localStorage.setItem("history", JSON.stringify(history));

  session.classList.add("hidden");
  result.classList.remove("hidden");

  let grade = score>=90?"A":score>=75?"B":score>=50?"C":"D";
  document.getElementById("grade").innerText = grade;

  let passed = goal==="80" ? score>=80 : reasons.length <= parseInt(goal);
  goalResult.innerText = passed ? "✅ Goal achieved" : "❌ Goal failed";

  let earned = [];
  if(score >= 90) earned.push("🥇 Disciplined");
  if(reasons.length === 0) earned.push("🧊 Clean");
  if(streak >= 3) earned.push("🔥 Streak");

  badgeEarned.innerText = earned.length ? "Unlocked: " + earned.join(", ") : "";
}

/* SAVE NOTE */
saveNoteBtn.onclick = () => {
  history[history.length-1].note = notes.value;
  localStorage.setItem("history", JSON.stringify(history));
  location.reload();
};

/* CHART */
function drawChart(){
  if(plan==="free"){
    chart.style.display="none";
    chartLock.classList.remove("hidden");
    return;
  }

  let ctx = chart.getContext("2d");
  let data = history.slice(-7).map(h=>h.score);

  ctx.beginPath();
  data.forEach((v,i)=>{
    let x = i*40 + 10;
    let y = 150 - v;
    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });
  ctx.strokeStyle="#7c3aed";
  ctx.stroke();
}
drawChart();

/* JOURNAL */
function loadJournal(){
  if(plan==="free"){
    journalContent.style.display="none";
    journalLock.classList.remove("hidden");
    return;
  }

  journalContent.innerHTML="";
  history.slice().reverse().forEach(h=>{
    journalContent.innerHTML += `
      <div class="entry">
        <strong>${h.score}%</strong><br>
        ${(h.reasons||[]).join(", ")}<br>
        ${h.note || "-"}
      </div>
    `;
  });
}
loadJournal();

/* BADGES */
function loadBadges(){

  if(plan==="free"){
    badgesDiv.style.display="none";
    badgeLock.classList.remove("hidden");
    return;
  }

  let unlocked = {disc:false, streak:false, clean:false};

  history.forEach(h=>{
    if(h.score>=90) unlocked.disc=true;
    if((h.reasons||[]).length===0) unlocked.clean=true;
  });

  if(streak>=3) unlocked.streak=true;

  badgesDiv.innerHTML = `
    <div class="badge ${unlocked.disc?'':'locked'}">🥇 Disciplined</div>
    <div class="badge ${unlocked.streak?'':'locked'}">🔥 Streak</div>
    <div class="badge ${unlocked.clean?'':'locked'}">🧊 Clean</div>
  `;
}
loadBadges();

</script>

</body>
</html>
