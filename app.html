<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeTrack</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 40px 20px;
  text-align: center;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 16px;
  margin-top: 20px;
}

button {
  padding: 12px 20px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  margin: 6px;
  font-weight: bold;
  color: white;
}

.primary { background: linear-gradient(135deg,#4f7cff,#7c3aed); }
.success { background: linear-gradient(135deg,#22c55e,#16a34a); }
.danger { background: linear-gradient(135deg,#ef4444,#dc2626); }

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 15px rgba(124,58,237,0.6);
}

.stats {
  display: flex;
  justify-content: space-around;
  margin-top: 20px;
}

.stat {
  background: rgba(0,0,0,0.4);
  padding: 15px;
  border-radius: 12px;
  width: 30%;
}

textarea {
  width: 100%;
  border-radius: 10px;
  border: none;
  padding: 10px;
  background: #111;
  color: white;
  margin-top: 10px;
}

.rules-box {
  background: #111;
  padding: 15px;
  border-radius: 10px;
  margin-top: 10px;
}

.streak {
  font-size: 18px;
  color: gold;
}

.lock-message {
  margin-top: 10px;
  color: #facc15;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h1>TradeTrack</h1>
<div class="streak">🔥 Streak: <span id="streak">0</span></div>

<div class="card">

<div class="rules-box" id="rulesPreview">Set rules before trading</div>

<div class="stats">
<div class="stat">Trades<br><span id="trades">0</span></div>
<div class="stat">Mistakes<br><span id="breaks">0</span></div>
<div class="stat">Score<br><span id="score">0</span>%</div>
</div>

<button id="goodBtn" class="success" onclick="followRule()">Executed Discipline</button>
<button id="badBtn" class="danger" onclick="breakRule()">Broke Rule</button>

<div id="lockMsg" class="lock-message"></div>

<textarea id="journalInput" placeholder="Write your journal... (Ctrl + Enter to submit)"></textarea>

<button class="primary" onclick="endSession()">End Session</button>

</div>

</div>

<script>

let trades=0, breaks=0, good=0, score=0;
let streak = parseInt(localStorage.getItem("streak")) || 0;
let history = JSON.parse(localStorage.getItem("calendarData")) || {};
let sessionLocked = false;

/* ACTIONS */
function followRule(){
  if(sessionLocked) return;
  trades++; good++;
  calculateScore();
  checkLimit();
  updateUI();
}

function breakRule(){
  if(sessionLocked) return;
  trades++; breaks++;
  calculateScore();
  checkLimit();
  updateUI();
}

/* SCORE */
function calculateScore(){
  score = trades===0 ? 0 : Math.round((good/trades)*100);
}

/* LOCK SYSTEM */
function checkLimit(){
  if(trades >= 2){
    sessionLocked = true;

    document.getElementById("lockMsg").innerText =
      "Max trades reached. Write your journal, then press Ctrl + Enter or click End Session.";

    document.getElementById("goodBtn").disabled = true;
    document.getElementById("badBtn").disabled = true;
  }
}

/* JOURNAL COMMIT (SAFE TRIGGER) */
document.getElementById("journalInput").addEventListener("keydown", function(e){
  if(e.ctrlKey && e.key === "Enter"){
    if(sessionLocked){
      endSession();
    }
  }
});

/* MANUAL END */
function endSession(){

  if(sessionLocked && document.getElementById("journalInput").value.trim().length === 0){
    alert("Write your journal before ending session");
    return;
  }

  let today = new Date().toISOString().split("T")[0];

  history[today] = {
    score,
    trades,
    breaks,
    journal: document.getElementById("journalInput").value
  };

  localStorage.setItem("calendarData", JSON.stringify(history));

  if(score >= 75) streak++;
  else streak = 0;

  localStorage.setItem("streak", streak);

  alert("Session saved");

  /* RESET */
  trades=0; breaks=0; good=0; score=0;
  sessionLocked=false;

  document.getElementById("journalInput").value="";
  document.getElementById("lockMsg").innerText="";
  document.getElementById("goodBtn").disabled=false;
  document.getElementById("badBtn").disabled=false;

  updateUI();
}

/* UI */
function updateUI(){
  document.getElementById("trades").innerText=trades;
  document.getElementById("breaks").innerText=breaks;
  document.getElementById("score").innerText=score;
  document.getElementById("streak").innerText=streak;
}

updateUI();

</script>

</body>
</html>
